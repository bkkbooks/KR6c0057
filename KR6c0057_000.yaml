body:
  text: 律而惟文字之是咎抑末矣古語云若非玉人夢破別有生涯安得四海五湖斬新日月斯孟嘉補注意乎請以是徵諸識者時天啓丙寅仲夏既望汰生居士查應光撰永明智覺禪師云夫金剛般若能開解脫之門玉偈波羅善入菩提之路行行而非空非有句句而無去無來經説三十二分功德難量圓持四句偈文殊因莫測書寫讀誦當生華藏之天為人演説定達涅槃之宅般若乃菩提佛母信心即功德道源長養聖胎出生妙法大抵看經通義問道窮源啓淨信心具擇法眼心心無間理全彰念念不忘文自現遣辭而解義左右逢源如盤之走珠縱橫無礙信解受持者洞明真性見聞隨喜者咸悟菩提流通天上人間普遍微塵剎海大虗無際法施何窮以斯般若功勛總報四恩三有觀夫空如來藏碎祖師關獨露真常無非般若三心不動六喻全彰七寶校功四句倍勝若乃循行數墨轉益見知宗眼不明非為究竟嗟夫微宣奧旨石火電光密顯真機銀山鐵壁瞥生異見滯在中途進步無門退身迷路聊通一線俯為初機良馬見鞭追風千里矣
