body:
  text: 三山鶴軒居士韓巖集解海陽夢華居士程衷懋補注金剛者金中精堅者也剛生金中百鍊不消取此堅利能斷壞萬物譬如智慧能斷一切煩惱轉為妙用般若者梵語也華言智慧性體虗融照用自在故云般若梵語波羅蜜華言到彼岸欲到彼岸須憑般若不著諸相謂之彼岸若著諸相謂之此岸又云心迷則此岸心悟則彼岸經者經也見性之徑路也道川禪師云法不孤起誰為安名頌曰摩訶大法王無短亦無長本來非皂白隨處見青黃華發看朝艷林凋逐曉霜疾雷何太急迅雷亦非光凡聖猶難測龍天豈度量古今人不識權立號金剛宗鏡云此一卷經六道含靈一切性中悉皆具足只為受身之後妄為六根六塵埋沒此段靈光不知不覺故佛發慈悲心願一切衆生齊超苦海共證菩提所以說是經大意只是為人解粘去縛直下明了自性究竟堅固萬劫不壞如金性堅剛也法會因由分第一標舉教起根源依昭明所斷之分頌曰聖凡同聚給孤園似月如星共一天持鉢著衣弘聖化人人盡是火中蓮如是我聞一時佛在舍衛國至千二百五十人俱如是我聞如來臨涅槃日阿難問曰佛滅度後一切經首初安何字佛言初安如是我聞次顯處所蓋如是者指一經所聞法體也我聞阿難謂如是之法我從佛聞也一時即如來說法機應和合時也佛者覺也佛是教主尊極名佛若以諸大宗師言之如者衆生之性萬別千差動靜不一無可比類無可等倫是者只是衆生性之別名離性之外更無別法又云法非有無謂之如皆是佛法謂之是川禪師云古人道喚作如如早是變也且道變向甚麼處去咄不得亂走必竟作麼生道火不曾燒却口如如靜夜長天一月孤是是水不離波波是水鏡水塵風不到時應現無瑕照天地我者為性自在強名之也又云身非有我亦非無我不二自在名為真我聞者聽聞也經云聽非有聞亦非無聞了無取捨名為真聞川禪師云淨裸裸赤灑灑沒可把頌曰我我認得分明成兩箇不動纖毫合本然知音自有松風和切忌隨他去頌曰猿啼嶺上鶴唳林間斷雲風捲水激長湍最愛晚秋霜午夜一聲塞鴈覺天寒一時者謂說理契機感應道交之時也川禪師云一相隨來也頌曰一一破二成三從此出乾坤混沌未分前已是一生參學畢時如魚飲水冷暖自知頌曰時時清風明月鎮相隨桃紅李白薔薇紫問著東君總不知佛者內覺無諸妄念外覺不染六塵又云非相而相應身佛也相而非相報身佛也非相非非相法身佛也川禪師云無面目說是非漢頌曰小名悉達長號釋迦度人無數攝伏羣邪若言他是佛自己却成魔祇把一枝無孔笛為君吹起太平歌在者所在之處也川禪師云客來須看不得放過隨後便打頌曰獨坐一爐香經文誦兩行可憐車馬客門外任他忙舍衛國者波斯匿王所居之國祇者匿王太子祇陀也樹是祇陀所施故言祇樹給孤獨園者給孤長者所施之園共建立精舍也比丘者去惡取善名小比丘善惡俱遣名大比丘也若悟達此理即證阿羅漢位能破六賊小乘四果人也川禪師云獨掌不浪鳴頌曰巍巍堂堂萬法中王三十二相百千種光聖凡瞻仰外道歸降莫謂慈容難得見不離祇園大道場爾時世尊食時著衣持鉢至洗足已敷座而坐爾時佛現世時也世尊三界四生中智慧福德無有等量一切世間之所尊也食時正當辰食將辦之時也著衣服僧伽黎柔和忍辱衣也乞食佛以禪悅法喜為食而行乞者示同凡僧欲令折己慢幢生彼福德也次第如來慈悲不擇貧富平等普化也洗足淨身業也敷座而坐跏趺入禪示一切法空也川禪師云惺惺著頌曰飯食訖兮洗足已敷座坐來誰共委向下文長知不知看看平地波濤起善現起請分第二善現起請佛法為衆決疑頌曰解空特地播風雲九曲難穿問世尊兩鏡光含千古意珠璣瀉出顯家門時長老須菩提在大衆中至善付囑諸菩薩時空生起問之時也長老德尊年高也梵語須菩提華言解空亦名善現從座起至恭敬乃請法之儀右膝著地先淨三業摧伏身心也合掌心合於道道合於心也希有佛性含容萬法無可比類也如來如者佛性之本體也來者佛性之應用也如如不變而應現萬緣非來非去心常空寂也善護念者為護根熟菩薩與智慧力令其成就自行與教化力令其攝受衆生也善付囑者為付囑根未熟菩薩已得大乘者令其不捨未得大乘者令其勝進也梵語菩薩華言道心衆生常行恭敬乃至蠢動含靈悉起敬愛之心不生輕慢也川禪師云如來不措一言須菩提便興讚嘆具眼勝流試著眼看頌曰隔墻見角便知是牛隔山見烟便知是火獨坐巍巍天上天下南北東西鑽龜打瓦咄世尊善男子善女人至云何應住云何降伏其心梵語阿耨多羅三藐三菩提華言無上正等正覺謂真性也發阿耨三菩提心謂求真性成佛之心云何應住言云何可以安住諦理云何降伏言云何可以折攝散亂須菩提謂凡夫妄念煩惱無邊當依何法則得調伏也川禪師云這問從甚處出來頌曰你喜我不喜君悲我不悲鴈思飛塞北燕憶舊巢歸秋月春花無限意箇中只許自家知佛言善哉善哉須菩提至唯然世尊願樂欲聞如汝所說是佛讚嘆須菩提能知我意善教諸人不起妄念心常精進勿令染著諸法相也諦聽者謂汝當了達聲塵本來不生勿逐語言詳審而聽也應如是住者如來欲令衆生之心不生不滅湛然清淨即能見性也逍遙翁云凡人心境清淨是佛國淨土心境濁亂是魔國穢土也黃柏運禪師云凡夫多被境礙心事礙理常欲逃境以安心屏事以存理不知乃是心礙境理礙事但令心空境自空理寂事自寂勿倒用心也又云凡夫取境智者取心心境雙亡乃是真法亡境猶易亡心至難人不敢亡心恐落於空無撈摸處不知空本無空唯一真法界耳故萬法唯心心亦不可得既無所得便是究竟何必區區更求解脫也如是降伏其心者若見自性即無妄念既無妄念即是降伏其心矣唯然應諾協望之謂願樂欲聞欣樂欲聞其法也川禪師云往往事從叮囑生頌曰七手八腳神頭鬼面棒打不開刀割不斷閻浮踔躑幾千回頭頭不離空王殿大乘正宗分第三佛教菩薩六度圓修衆生一體無我無人誰歸滅度故立此名頌曰大乘境界盡含容凡聖元來事一同掃盡微塵生死念依然面目舊家風佛告須菩提諸菩薩摩訶薩至壽者相即非菩薩摩訶薩摩訶言大心量廣大不可測量乃是大悟人也衆生謂於一切善惡凡聖等見有取捨心起無量無邊煩惱妄想輪回六道是也無明迷覆為卵生煩惱包褁為胎生愛水浸淫為濕生歘起煩惱為化生教中云眼耳鼻舌不能回光內燭有所貪漏即墮四生謂胎卵濕化是也色聲香味回光內燭無所貪漏即證四果謂須陀洹等是也傅大士云空生初請問善逝應機酬先答云何住次教如是修胎生卵濕化咸令悲智收若起衆生見還同著相求若有色謂凡夫執著之心妄見是非不契無相之理若無色執著空相不修福慧若有想眼見耳聞遂生妄想口說佛行心不依行若無想坐禪除妄猶如木石不習慈悲智慧方便若非有想有無俱遣語默雙亡有取捨憎愛之心不了中道也非無想謂有求理心也臨濟云入凡入聖入清入淨處處現諸國土盡是諸法空相是名真正見解你若愛聖憎凡生死海裏浮沉我佛自謂也無餘者真常湛寂也涅槃者菩薩心無取捨如大月輪圓滿寂靜衆生迷於涅槃無相之法而為生死有相之身滅除滅度化度也如來指示三界九地各有涅槃妙心令自性入心無取捨無邊煩惱轉為妙用同證圓滿清淨涅槃渡生死大海實無衆生得滅度者謂如上九類衆生皆由自之業緣而有清淨本性無衆生可度無涅槃可到一切衆生本來是佛也造化因心偈云賦象各由心影響無欺詐元無造化工衆生自造化我相倚恃名位權利攀高接貴輕慢貧賤愚迷之流人相有能所心有知解心未得謂得未證謂證自恃持戒輕破戒者衆生相謂苟求希望之心言正行邪口善心惡壽者相覺時似悟見境生情執著諸相希求福德有此四相則同衆生非菩薩也臨濟禪師云五蘊身田內有無位真人堂堂顯露何不識取但於一切時中切莫間斷觸目皆是只為情生智隔想變體殊所以輪回三界受種種苦敢問諸人觸目皆是是箇甚麼一一山河無隔礙重重樓閣應時開川禪師云頂天立地鼻直眼橫頌曰堂堂大道赫赫分明人人本具箇箇圓成祇因差一念現出萬般形妙行無住分第四於一切法非即非離無違無住頌曰透過聲香色是誰投身飼虎自家為精金百鍊雖光彩且不重添眼上眉復次須菩提菩薩於法至其福德不可思量復次連前起後之辭菩薩於法者總標一切空有之法如六塵諸法是也應無所住一切之法應當無所住著也法華經云十方國土中惟有一乘法謂一心也心即是法法即是心二乘之人謂心外別有法遂生執著住於法相此同衆生之見解也逍遙翁云凡人不識自佛一向外求住相迷真分別他境不為助道但求福門似箭射空如人入暗菩薩了悟人法二空心無取捨能知凡聖一等空色一般善惡一體臨濟和尚頌云心境頓消融分明色與空欲識本來體青山白雲中是菩薩心無所著也布者普也施者捨也菩薩所修六度萬行以布施為初度攝後五度謂除人我衆生壽者四相煩惱妄想取捨愛憎之心世尊即以教法布施內破一切執著外即利益一切衆生菩薩布施皆應無住不見有我為能施人不見有他為受施者不見中間有物可施三體皆空住無所住清淨行施不憂己乏不望報恩不求果報也凡夫布施希求福利此是住相布施也永嘉大師云住相布施生天福猶如仰箭射虗空逍遙翁云誦金剛經者若人了知住無所住心得無所得法者此名慧業若人日積課誦之功希求福利此名福業二者相去如霄壤也不住色布施謂智慧性照見一切皆空無色可捨名為布施如藥對病如空含有有病既除空藥俱遣色空泯絶中道皆亡了無一法可得不若二乘捨色取空是為不住色而行布施玄奘法師所譯經云不住於色不住非色香味觸法一例皆然是故空有悉皆無住無空可取無有可捨空有同如一體平等平等行施即如法界不住有施不住無施不得有無二邊障礙施心廣大猶如虗空所獲功德亦復如是故經中舉十方虗空較量施福即斯意耳華嚴經云不求色聲香與味亦不希求諸妙觸但為救度諸衆生常求無上最勝智此正所謂行布施也傅大士云施門通六行六行束三檀資生無畏法聲色勿相干二邊純莫立中道不須安欲覔無生理背鏡向心觀臨濟云佛有六通者謂入色界不為色惑入聲界不被聲惑入香界不被香惑入味界不被味惑入身界不被觸惑入意界不被法惑達此六種皆是空相不能繫縛此乃無依道人雖是五蘊穢陋之身便是地行菩薩黃蘗云本是一精明分為六和合一精明者一心也六和合者六根也各與塵合眼與色合耳與聲合鼻與香合舌與味合身與觸合意與法合中間生六識為十八界若了十八界無所有一切皆空束六和合為一精明此乃了悟之人唯有真心蕩然清淨菩薩應如是布施者謂捨除一切煩惱憎愛之心也然煩惱本性皆是妄見有何可捨經云一切諸有如夢如幻一切煩惱是魔是賊逍遙翁云夫煩惱性是佛境界觀煩惱性空是正修行學人若止依此觀煉精至不須求別法也又云夫見性之人十二時中凡遇逆順境界心即安然不隨萬境所轉一任毀謗於我我既不受惡言謗黷返歸自己所謂自作自受者也譬如有人手執火炬擬欲燒天徒自疲困終不可得故古德云心隨萬境轉轉處實能幽隨流認得性無喜復無憂不住於相者非但見色是相一切種種分別皆名為相如是之相皆從因緣而生應知一切分別皆如夢幻遇緣即施緣散即寂是故佛言凡所有相皆是虗妄又西明和尚云法相若是有可言住諸相法相既本無故言不住相逍遙翁云須知諸法如夢如幻如影如響如水中月如鏡中像又云了達一切法不住一切相心如虗空自然無礙心住於相即屬有法故知一切法不住一切相即能見佛性也若住相布施但得人天果報而已傅大士云若論無相施功德極難量行悲濟貧乏果報勿須望凡夫情行劣初且略稱揚欲知檀狀貌滿空遍十方川禪師云若要天下行無過一藝精頌曰西川十樣錦添華色轉鮮欲知端的意北斗面南看虗空不礙絲頭念所以彰名大覺仙須菩提於意云何東方虗空至菩薩但應如所教住不也世尊須菩提謂虗空我思量之實無可思量也不可思量者既已覺悟心無能所即無我人衆生壽者四相雖不徼福自然離生死苦受涅槃樂無限福德豈可思量但應如所教住謂諸學人當依佛教行無所住必得悟入也蓋由不住相施施契性空空性無邊施福無邊故舉十方虗空以為其喻川禪師云可知禮也頌曰虗空境界豈思量大道清幽理更長但得五湖風月在春來依舊百花香如理實見分第五如理之見理本無見無見之見是為實見頌曰悟處分明見得真鏡中面目自家身莫言諸相都拈却只是如今箇主人須菩提於意云何至如來所說身相非身相不可以身相得見如來者如來真身本無生滅湛然常住託陰受形同凡演化故可以身相見者非佛法身也色身有相法身無相色身者地水火風假合成人法身者即無形狀相貌須菩提以凡夫但見色身不見法身故答是語所說身相即非身相者非無也凡夫謂色身是有執著修行所以不見佛性生死轉重如來法身無相故言所說身相非身相謂無真實身相也華嚴經云佛以法為身清淨如虗空故雲門大師云我當時若見一棒打殺與狗子喫者此大乘先覺之人解黏去縛遣疑破執也黃蘗云夫學道人若欲得知要訣但莫於心上著一物佛真法身猶若虗空此謂法身即虗空虗空即法身常人謂法身遍虗空處虗空中含容法身不知法身即虗空虗空即法身也虗空與法身無異相佛與衆生無異相生死與涅槃無異相煩惱與菩提無異相離一切相即名諸佛頌曰凡相滅時性不滅真如覺體離塵埃了悟斷常根果別此名佛眼見如來川禪師云且道只今行住坐臥是甚麼相頌曰身在海中休覓水日行嶺上莫尋山鶯啼燕語皆相似莫問前三與後三佛告須菩提凡所有相至若見諸相非相即見如來凡所有相皆是虗妄謂非獨佛身相即無相凡所有相皆是虗妄是色身有相故言虗妄法身無相故言非相也若見諸相非相則見如來者言身虗妄即是人空言非相者即是法空若悟人法二空即見自性蓋如來者乃自性不屬去來也四大色身本由妄念而生去來不實若執虗妄身相而欲見如來之性譬如認賊為子終無是處傅大師云如來舉身相為順世間情恐人生斷見權且立虗名假言三十二八十也空聲有身非覺體無相乃真形川禪師云山是山水是水佛在甚麼處頌曰有相有求皆是妄無形無相墮偏枯堂堂密密何曾間一道寒光爍太虗正信希有分第六生正信向心斯人最為希有頌曰正信之人骨有靈心如果日洞然明眼空不見黃金貴面壁忘機海晏清須菩提白佛言世尊至能生信心以此為實生實信不者須菩提謂前以無相行於布施即是因深得見無相如來即是果深因果之法既深恐如來滅後濁劫惡世之中無人聽信故有是問傅大士云因深果亦深理密奧難尋當來末法後惟慮法將沉空生情未達聞義恐難任如能信此法定是覺人心華嚴經云信為道源功德母長養一切諸善法智度論云佛法大海信為能入是實信者實諦之階也有持戒修福者不著諸相即是持戒心常空寂無諸妄念即是修福此人不被諸境所惑能生信心以此為實慈受深禪師云念念常空寂日用有大力此是三世諸佛行履處六代祖師行履處無功之功功不虗弃川禪師云金佛不度爐木佛不度火泥佛不度水頌曰三佛容儀總不真眼中瞳子面前人若能信得家中寶啼鳥山花一樣春當知是人不於一佛二佛至得如是無量福德種諸善根者世間種種善事不可勝計大槩止是諸惡莫作諸善奉行是也法華經云隨宜方便事無復諸疑惑心生大歡喜自知當作佛傅大士云依他非自立必假衆緣成日謝樹無影燈來室乃明於無量千萬佛所者顯其已多種善根謂見佛多聞法多修行多也乃至一念生淨信者謂凡夫於諸法中起一切善惡凡聖等見有取捨心種種妄想不能生淨信菩薩了悟人法二空無諸妄念心常清淨聽信其法故言一念生淨信也傅大士云信心生一念諸佛盡能知生因於此日證果未來時三大經多劫六度久安施薰成無漏種方號不思議得如是福謂如來知見衆生無諸妄念心常清淨敬信其法所以得智慧勝妙功德不可測量川禪師云種瓜得瓜種果得果頌曰一佛二佛千萬佛各各眼橫兼鼻直昔年曾種善根來今日依前得渠力須菩提須菩提著衣喫飯尋常事何須特地却生疑何以故是諸衆生無復我相至無法相亦無非法相釋生信得福之故該乎生法二空無復我人衆生壽者相謂不倚恃名位勢利精進持戒輕慢貧賤愚癡破戒之流無能所知解心無苟求希望心言行相應也此生空也無法相者經云心生則一切法生心滅則一切法滅心既清淨諸法皆空故無取捨一切善惡凡聖等見諸法相也亦無非法相謂不著能知解心不作有所得心無人無法內明實相外應虗緣也此法空也圜悟禪師云伶俐漢腳跟須點地脊梁要硬似鐵遊人間世幻視萬緣把住作主不狥人情截斷人我脫去知解直下以見性成佛直指妙心為階梯及至作用外應虗緣不落窠臼辦一片長久守寂淡身心於塵勞中透脫去乃善之善也川禪師云圓同大虗無缺無餘頌曰無相非法相開拳復成掌浮雲散碧空萬里天一樣何以故是諸衆生若心取相至不應取非法心若取相即取妄念故著我人衆生壽者相也圜悟禪師云諸佛開示祖師直指唯心妙性徑捷承當不起一念透頂透底於見成際不勞心力任運逍遙了無取捨乃真密印也黃蘗斷際禪師謂裴丞相云佛與衆生唯止一心更無差別此心無始以來無形無相不曾生不曾滅當下便是動念則乖猶如虗空無有邊際唯此一心即便是佛佛與衆生更無別異但是衆生著相外求求之轉失使佛覓佛將心捉心窮於盡形終無所得不知息念亡慮佛自現前不假修證本自具足若不決定信此是佛縱使纍劫修行終不成道取法相者謂言心外有法故著諸相也慈受云順天門外古招提爛熳春光照錦溪物物更無心外法箇中能有幾人知逍遙翁云欲外安和但內寧靜心虗境寂念起法生水濁波渾潭清月朗修行之要靡出於斯黃蘗云造惡造善皆是著相著相造惡枉受輪回著相造善枉受勞苦都總不如便自認取本心心外無法此心即法法外無心將心無心心却成有一切在我默契而已若取非法相謂有取捨善惡等相也疏云五陰空為法五陰相為非法即以陰空為藥名法陰有為病名非法陰病既除空藥亦遣非法既謝在法亦亡傅大士云人空法亦空二相本來同遍計虗分別依地礙不通圓成沈識海流轉若飄蓬欲識無生理心外斷行蹤是不著諸法相也不應取法不應取非法謂有無俱遣語默雙亡若取法相則有法執若取非法相則有空執有執則煩惱熾然無執則信心清淨傅大士云有因名假號無相有馳名有無無別體無有有無形有無無自性妄起有無情有無如谷響勿著有無聲是了中道也川禪師云金不博金水不洗水頌曰得樹攀高未足奇懸崖撒手大夫兒水寒夜冷魚難覔留得空船載月歸以是義故如來常說至法尚應捨何況非法執有說空因河用筏有執既喪空說奚存既是渡河那更存筏傅大士云渡河須用筏到岸不須船人法知無我悟理詎勞筌中流仍被溺誰論在二邊有無如取一即被污心田法尚應捨何況非法者法相屬有非法相屬無乃兩頭見直須截斷譬如人未渡河須假船筏既到彼岸當離其筏不可執著也人未出生死愛河須假佛法既得度脫法亦當捨所以趙州道佛之一字不吾喜聞經云若人欲識佛境界當淨其意如虗空外無一法而建立法尚應捨何況非法乎川禪師云水到渠成頌曰終日忙忙那事無妨不求解脫不樂天堂但能一念歸無念高步毗盧頂上行無得無說分第七當體空寂無物可得凡有言說皆為剩語頌曰識破娘生無所得虗空那話是和非炳然一句威音外雲去雲來天不移須菩提於意云何至亦無有定法如來可說如來有所說法耶佛所問意恐人謂如來有所說也蓋真如法體離有無相離言說相豈可以耳聞心得當知樹下得道諸會說法但應身耳其報身法身無得無說也無有定法者根器有利鈍學性有淺深隨機設教對病用藥法華經云諸根利鈍精進懈怠隨其所堪而為說法是故法無定相迷悟懸殊若未悟時似無所得若悟了時似有所得得與不得皆是妄見但不可執著自契中道豈有定法可說川禪師云寒即言寒熱即言熱頌曰雲起南山雨北山驢名馬字幾千般請看浩渺無情水幾處隨方幾處圓何以故如來所說法皆不可取不可說非法非非法不可取者空生恐學人不悟如來無相之理不可說者恐學人執著如來所說章句也蓋如來所說者無上菩提之法可以性修而不可以色相取可以心傳而不可以口舌說也非無也非非不無也法本不有莫作無見法本不無莫作有見謂無即成斷滅語有即成邪見須菩提所以兩言其不可也是法也微妙玄通深不可識一以言有雖有而未嘗有一以為無雖無而未嘗無此非法非非法真空不空豈有定法可說也傅大士云菩提離言說從來無得人須依二空理當證法王身有心俱是妄無執乃名真若悟非非法逍遙出六塵川禪師云是甚麼頌曰恁麼也不得不恁麼也不得廓落太虗空鳥飛無影迹撥轉機輪却倒回南北東西任往來所以者何一切賢聖皆以無為法而有差別一切賢聖三世十方佛菩薩也無為者自然覺性無假人為一切賢聖皆用此法然法本無為何有差別第性有利鈍學有淺深遂生差別見解既有差別見解故無定法也海覺元禪師云一金成萬器皆由匠者智何必毗耶城人人說不二傅大士云人法俱名執了即二無為菩薩能齊證聲聞離一非所知煩惱盡空中無所依常能作此觀證果定無疑川禪師云毫𨤲有差天地懸隔頌曰正人說邪法邪法悉歸正邪人說正法正法悉歸邪江北成枳江南橘春來都放一般花依法出生分第八諸佛所依之法盡從此經出頌曰百千妙義佛諸祖盡在毫端一密中七寶三千非比喻此心包納太虗空須菩提於意云何若人滿至是故如來說福德多佛意欲顯無為之福先將有漏之福較量三千大千世界七寶布施乃是住相布施希求福利得福雖多而於識心見性了無所得蓋布施供養身外之福受持經典德性之福身福藉物而修物有限而福亦有限非福德性之比故言如來說福德多以其有限得以計其多寡也傅大士云寶滿三千界齎持作福田惟成有漏業終不離人天故知心無能所識心見性方名福德性也川禪師云事向無心得頌曰寶滿三千及大千福緣應不離人天若知福德元無性買得風光不用錢若復有人於此經中至為他人說其福勝彼受持者身口意皆清淨是也曉解經義依教而行如船入海無所不通是名受持不解經義而又懈怠心口相違如入溝港即有斷絶非受持也張無盡云佛為無上法王金口所宣聖教若一誦之則為法輪轉地夜叉唱空報四天王乃至梵天通明通暗龍神悅懌如綸言誕布孰不欽奉誦經之功如此若但形留神往尋行數墨而已何異春禽晝轉秋蛩夜鳴雖千萬遍何益哉薌山因禪師云燈籠露柱熾然說莫學驢年紙上鑽看經須具看經眼多見看經被眼瞞四句偈百丈云眼耳鼻舌各不貪染一切諸法是名受持四句偈亦名四果仙人亦名六通羅漢陳居士云一切佛法攝在四句偈中故得之者不在文字之多但一念頃即入實諦若更勤行精進受之不忘持之不厭普為他人演說既能自利更能利人其福德廣大勝彼七寶布施傅大士云持經取四句與聖作良緣欲入無為海須乘般若船何以故須菩提一切諸佛至三菩提法皆從此經出阿耨多羅三藐三菩提謂真性也一切諸佛菩提法者謂諸佛求真性之法也一切諸佛求真性之法皆從此經出則此經之功為極大而受持者之福德信無窮矣忠國師云茲經喻如大地何物不從地之所生諸佛惟指一心何法不從心之所立故云皆從此經出川禪師云且道此經從甚處出須彌頂上大海波心頌曰佛祖垂慈實有權言言不離此經宣此經出處還相委便向雲中駕鐵船切忌錯會須菩提所謂佛法者即非佛法所謂佛法者阿耨多羅三藐三菩提法也於本性中非為真實唯假此以開悟衆生故謂佛法即非佛法二乘之人執著諸相以為佛法遂乃向外尋求文殊師利云一切衆生愚迷顛倒不悟種種修行不離身內菩薩於諸佛法都無染著亦不捨離見如不見聞如不聞心境空寂自然清淨學道之人既能覺悟諸相皆空但用所得知解做藥治箇心中妄想執著之病心地自然調伏無罣礙也川禪師云能將蜜果子換如苦葫蘆頌曰佛法非法能縱能奪有放有收有生有殺眉間長放白毫光癡人猶待問菩薩一相無相分第九只此一相本自無形頌曰一相本來元不有明珠鑽透兩頭空要知四果安身處鏡破形忘那有蹤須菩提於意云何至而實無來是故名阿那含須陀洹等四菩薩雖得是果而不存有所得心佛恐四菩薩不知以無念為宗尚萌所得之念故設四問須菩提皆以不也答之復為辨論以形容其所詣之實須陀洹者知身是妄欲入無為之理斷除人我執著之相能捨粗重煩惱未能離微細煩惱此人不入地獄不作修羅餓鬼異類之身是謂學人悟初果也逍遙翁云夫煩惱者菩提之根本也若人照了煉習可為出世之法譬高原陸地不生蓮花而生於淤泥濁水中也故云莫管煩惱障但存菩提心入流者謂捨凡入聖初入聖流也而無所入修務漏業不入六塵然終不能捨離塵境傅大士云捨凡初入聖煩惱漸輕微斷除人我執創始證無為緣塵及身見今者乃知非布施人天後趣寂不知歸不入色聲香味觸法者厭喧求靜六塵之境於念未忘所以不入色聲香味觸法也圜悟禪師云報緣未謝世上有許多交涉應須應之使綽綽然有餘裕始得人生各隨緣分不必厭喧求靜但令中虗外順雖在閙市沸湯中亦恬然安隱才有纖毫見刺即便打不過也斯陀含者是漸修精進之所修無漏業念念不住六塵境界然終未有湛然清淨之心一往來謂人間報謝一往天上却來人間受生斷餘思惑方得涅槃也實無往來謂前念才著後念即覺是無得果之心心實無我誰為往來阿那含者已悟人法俱空漸修精進念念不退菩提之心名為不來者謂能斷惑內無欲心外無欲境已離欲界不來受生故名不來心空無我實無不來之相故云而實無來也川禪師云諸行無常一切皆空頌曰三位聲聞已出塵往來求靜有疏親明明四果元無果幻化空身即法身須菩提於意云何至是第一離欲阿羅漢梵語阿羅漢華言無生謂諸漏已盡無復煩惱更不於三界內受生由須菩提當此果也實無有法謂無煩惱可斷無貪嗔可離情無順逆境知俱亡豈有得果之心若我念未空於道有得於法有名是凡夫之行即著我人衆生壽者相也無諍三昧此名正定心心無生滅名為正定人中最為第一離欲阿羅漢者能離一切欲亦無離欲之心微細四相皆已滅盡愛染不生故謂之離欲耳川禪師云把定則雲行谷口放行也月落寒潭頌曰喚馬何曾馬呼牛未必牛兩頭都放下中道一時休六門迸出遼天鶻獨步乾坤總不收世尊我不作是念至而名須菩提是樂阿蘭那行須菩提恐人不知去所得心是以咨啓世尊至於再四言我若作是念我是離欲得道果者即是心著四相與法為諍不名離欲阿羅漢也樂好也阿蘭那此言無諍言樂阿蘭那行者是好無諍行之人也有是好則必有是行有是行則必有所得須菩提得無諍三昧則雖有是行而念無所得故言實無所行所以世尊許須菩提是樂阿蘭那行者百丈禪師出只如今一切諸法若於藏府中有纖毫停留是不出網但有所求所得生心動念盡是野干若藏府中都無所求都無所得此人諸惡不生人我不起是納須彌於芥子中不起一切貪嗔是能吸四大海水於一切境不惑不亂不嗔不喜刮削併當得淨潔是無事人勝一切知解精進頭陀是名天眼是名有法界性是作車載因果是佛出世度衆生傅大士云無生亦無滅無我亦無人永除煩惱障長辭有後身境亡心亦滅無復起貪嗔無悲空有智悠然獨任真川禪師云認著以前還不是頌曰𧉻腹隱明珠石中藏寶玉有麝自然香何用臨風立活計看來恰似無應用頭頭皆具足莊嚴淨土分第十以清淨心莊嚴法身淨土頌曰家破人亡國已空更無南北與西東寥寥晴際霜天夜才有微雲便不同佛告須菩提於意云何至燃燈佛所於法實無所得於法有所得不者如來欲破二乘執著之心故有此問白樂天問寬禪師云無修無諍何異凡夫師云凡夫無明二乘執著離此二病是名真修也真修者不得勤不得忘勤則近執著忘則落無明不著不忘乃為心要耳此入道之法門也於法實無所得空生謂如來自性本來清淨本無塵勞寂而常照即自成佛而於燃燈所於法實無所得傅大士云昔時稱善慧今日號能仁看緣緣是妄識體體非真法性非因果如理不從因謂得燃燈記寧知是舊身川禪師云古之今之頌曰一手指天一手指地南比東西秋毫不覩生來心膽大如天無限羣魔倒赤幡須菩提於意云何至即非莊嚴是名莊嚴佛土者佛之妙性也衆生之真心也隨其心淨即佛土淨奚以外飾為哉故造寺寫經布施供養此是著相莊嚴若人心常清淨不向外求任運隨緣一無所得行住坐臥與道相應是名莊嚴佛土龐婆轉藏經維那請回向婆於面前取梳子就腦後插云回向了也此是無能所心傅大士云莊嚴絶能所無我亦無人斷除俱不染頴脫出囂塵川禪師云娘生袴子青州布衫頌曰抖擻渾身白勝霜蘆花雪月轉爭光幸有九皋翹足勢更添朱頂又何妨是故須菩提諸菩薩至不應住聲香味觸法生心菩薩莊嚴既不在於外飾則當反而求之於心凡夫之心無明起滅妄想顛倒取捨善惡凡聖等見是名濁亂心菩薩心常空寂無諸妄念不生不滅不動不搖即是生清淨心也不應住色生心者心常清淨不住六塵即不被諸境惑亂也逍遙翁云若人心境清淨是佛國土淨心境濁亂是魔國穢土也川禪師云雖云恁麼爭奈目前何頌曰見色非干色聞聲不是聲色聲不礙處親到法王城應無所住而生其心佛心本來清淨無相寧有所住衆生之心亦本無所住因境來觸遂生其心不知觸境是空將謂世法是實便於境上住心正猶猿猴捉月病眼見花若悟真性即無所住無所住心即是智慧無諸煩惱譬如太空無有罣礙黃蘗云心若清淨何假言說但於一切心無著即名無漏智汝每日行住坐臥一切語言但莫著有為法出言瞬目盡須無漏如今修行學道者皆著一切聲色何不與我心同虗空去如枯木石頭去如寒灰死火去方有少分相應若不如是他日盡被閻羅老子拷詆你在你但離却有無諸法心如日輪常在虗空自然不照而照豈不是省力底事到此之時無棲泊處即是行諸佛路便是應無所住而生其心是你清淨法身阿耨多羅三藐三菩提也傅大士云掃除心境地名為淨土因無論福與智先且離貪嗔川禪師云退後退後看看頑石動也頌曰山堂靜坐夜無言寂寂寥寥本自然何事西風動林野一聲寒鴈唳長天須菩提譬如有人至佛說非身是名大身色身雖大心量即小縱如須彌山王既有形相有可比量不名大身法身心量廣大等虗空界無形無相無可比量方名大身世尊欲以真心悟人託大身為問而須菩提深悟佛意遂對以佛說非身是名大身圜悟禪師云不登泰山不知天之高不涉滄溟不知海之濶此區中之論也若是其中人天在一粒粟米中海在一毫毛頭上浮幢王華藏界盡在眉毛眼睫間且道此箇人甚麼處安身立命還委悉麼無邊虗空盛不盡直透威音更那邊傅大士云須彌高且大將喻法王身七寶齊圍繞六度次相鄰四色成山相慈悲作佛因有形終不大無相乃為真川禪師云設有向甚麼處著頌曰擬把須彌作幻軀饒君膽大更心粗目前指出千般有我道其中一也無便從這裏入無為福勝分第十一現成公案不假施為此無為福勝他有無頌曰恆沙世界布金田雖福無涯未到邊端的悟明心地處片雲不挂是青天須菩提如恆河中所有沙數至尚多無數何況其沙如恆河中所有沙數者一沙即為一河是諸河中各有其沙則是河尚無數何況其沙也川禪師云前三三後三三頌曰一二三四數恆河沙等恆河數更多算盡目前無一法方能靜處薩婆訶須菩提我今實言告汝至而此福德勝前福德財施有盡法施無窮財施不出欲界法施能出三界縱將七寶滿三千大千世界以用布施得福雖多屬在有漏未免窮盡不如於此經受持四句偈等更能展轉教人皆得入佛知見了悟住無所住心得無所得法永超生死則此福德歷劫長在故勝前著相福德傅大士云恆河為比量分為六種多持經取四句七寶詎能過川禪師云真鍮不換金頌曰入海等沙徒費力區區未免走埃塵爭如運出家中寶枯木生花別是春尊重正教分第十二受持正教之人天人皆生敬重頌曰真如不動法難量聞經覩相即堪傷靈山一會如同在持者隨方是道場復次須菩提隨說是經至即為有佛若尊重弟子隨說者心無分別理應萬差隨順衆生而為說也當知此處者謂隨其所在之處也如佛塔廟謂心若空寂不起妄念以此無所得心無能解心而說是經令諸聽者生清淨心無諸妄念是名供養即此幻身便是法身中有如來全身舍利感得天人恭敬何殊塔廟成就者見性無疑也最上第一希有之法者佛與衆生本無差別若能心常清淨不生不滅無諸妄念便可立地成佛果禪師云心口意清淨是名佛出世身口意不淨是名佛滅度傅大士云法王遊歷處供養感修羅經中稱最上尊高似佛陀所在之處則為有佛若尊重弟子者若能行住坐臥一切時中心無起滅浩然清淨常修佛行念念精進無有間斷所在之處自心即佛是名佛子故可尊重矣果禪師云即心是佛無餘法迷者多於心外求一念朗然歸本性還如洗腳上船頭又云即心是佛更無別佛即佛是心更無別心如拳作掌似水成波波即是水掌即是拳也無業禪師問馬祖云如何是佛即心是佛祖云即你不了底心是更無別物也迷即衆生悟即是佛如拳作掌似掌作拳師於言下省悟百丈問長慶云如何是佛師云騎牛討牛僧問首山和尚云如何是佛山云新婦騎驢阿家牽鼓山圭禪師為作頌云阿家新婦兩同條咫尺家鄉路不遙可笑騎驢覓驢者一生錯認馬鞍橋又僧問慈受云如何是佛師云擔水河頭賣僧問太陽云如何是佛師云如何不是佛僧問歸宗云如何是佛師云我向汝道汝還信否僧云和尚誠言安敢不信師云只汝便是也川禪師云似海之深如山之固左旋右轉不去不住頌曰出窟金毛獅子兒全威哮吼衆狐疑深思不動干戈處直攝天魔外道歸如法受持分第十三法無所說般若非名當如此法信受行持頌曰求法如求鎮海珠九重淵底見真渠丹青國手難描出更欲安名便不如爾時須菩提白佛言世尊至以是名字汝當奉持善現既聞持經成就希有之法故問此經何名佛答以金剛般若波羅蜜意謂衆生心若清淨用智慧力照破諸法無不是空猶如金剛堅利斷絶外妄度生死苦海直至諸佛菩薩之彼岸也以是名字汝當奉持只是奉持此心行住坐臥勿令分別人我是非也圜悟禪師云才有是非紛然失心只這一句驚動多少人做計較若承當得坐得斷透出威音那畔若隨此語轉特地紛然須自回光返照始得天壇石鼓記云絲毫失度即招黑暗之愆霎頃邪言即犯禁空之醜天人耳目咫尺非遙克告行人自當省察廬山歸宗常神師曾有座主來參值宗鋤草次見一條蛇宗逐斬之主云久向歸宗元來却是箇粗行沙門宗云是你粗我粗諸人且道這僧過在甚麼處汾陽照禪師為作頌云廬嶽宗師接上機斬蛇特地施慈悲癡迷座主生驚怕却道粗心惹是非死心和尚云只者是大似眼裏著刺只者不是正是開眼磕睡諸人且道作麼生則是還委悉麼點鐵化成金即易勸人除却是非難川禪師云今日小出大遇頌曰火不能燒水不能溺風不能飄刀不能劈軟似兜羅硬似鐵壁天上人間古今不識噫所以者何須菩提至即非般若波羅蜜心無心相不取虗空不依諸地不住智慧截煩惱源達涅槃岸是般若波羅蜜然般若波羅蜜法體元空本無妄念默指此心證入於般若三昧超出意言之表而了無所得何名之有如來恐人生斷滅見不得已而強安是名故言即非般若也川禪師云猶較些子頌曰一手擡一手搦左邊吹右邊拍無絃彈出無生樂不屬宮商格調新知音知後徒名邈須菩提於意云何至世尊如來無所說本心元淨諸法元空更有何法可說二乘執著人法是有即有所說菩薩了悟人法皆空即無所說是故經云若有人言如來有所說法即為謗佛慈受禪師云吾心似秋月碧潭清皎潔無物堪比倫教我如何說寒山子云說不得則且止諸人還說得麼直須口似磉盤方始光明透漏若能了悟色性皆空有無俱遣語默雙亡即見自性清淨雖終日言猶為無言終日說猶為無說保寧勇禪師云門前諸子列成行各逞英雄越霸王如何獨有無言者坐斷毗盧不可當傅大士云名中有無義義上復無名金剛喻真智能破惡堅貞若到波羅岸入理出迷情智人心自覺愚者外求聲川禪師云低聲低聲頌曰入草求人不奈何利刀斫了手摩挲雖然出入無蹤跡文彩全彰見也麼須菩提於意云何至非世界是名世界諸微塵者一切衆生心上微塵也華嚴經云三千大千世界以無量因緣乃成衆生妄想煩惱客塵蔽覆淨性以成塵界其數無量如此煩惱妄想如病眼人見空中花如愚癡人提水中月求鏡中像枉用其心傅大士云妄計因成執迷繩謂見蛇心疑生暗鬼病眼見空花一境元無異三人乃見差了茲名不實長馭白牛車古德云一念不生全體現六根才動被雲遮察禪師云真淨界中才一念閻浮早已八千年逍遙翁云不怕念起惟恐覺遲覺速止速二相相宜知非改過蘧顏可師圜悟禪師上堂云十方同聚會箇箇學無為此是選佛場心空及第歸大丈夫具決烈志氣慷慨英靈踏破化城歸家穩坐外不見一切境界內不見有自己上不見有諸聖下不見有凡愚淨裸裸赤灑灑一念不生桶子底脫豈不是心空也到這裏還容棒喝麼還容玄妙理性麼還容彼我是非麼直下如紅爐上一點雪相似豈不是選佛場也然雖如是猶涉階梯在且不涉階梯一句作麼生道千聖會中無影迹萬人叢裏奪高標逍遙翁云五鼓夢回緣念未起靈響清徹聞和達聰為三妙音一曰幽泉瀨玉二曰清磬搖空三曰秋蟬曳緒凝聽靜專頗資禪悅安住妙境何勝如之要會麼病覺四肢如鶴瘦虗聞兩耳似蟬鳴非微塵是名微塵者一念覺來轉為妙用前念無諸妄想湛然清淨即非微塵後念不住清淨是名微塵非世界是名世界若無妄念即佛世界有妄念即衆生世界前念清淨即非世界後念不住清淨是名世界謝靈運云散則為微塵合則成世界無性則非微塵世界假名則是名微塵世界傅大士云積塵成世界析界作微塵界喻人天果塵為有漏因塵因因不實界果果非真因果知是幻逍遙自在人川禪師士南贍部洲北單越頌曰頭指天腳踏地飢則餐困則睡此土西天西天此土到處元正是大年南北東西只者是須菩提於意云何至是名三十二相三十二相者應身相也非相者法身相也是名三十二相者應既即法法全是應不妨說三十二相也此分大意謂細而微塵大而世界妙而佛之色身皆為虗妄但有名而已唯真性為真實故云非相既悟非相即見如來逍遙翁云須知諸佛法身而以相好莊嚴為身故臨濟云真佛無形真道無體真法無相也川禪師云借婆衫子拜婆年頌曰你有我亦有君無我亦無有無俱不立相對嘴盧都須菩提若有善男子善女人至為他人說其福甚多七寶布施外財也身命布施內財也以輕重較之外財輕而易內財重而難然此二施苟不能了達性空則是住相布施皆為有漏因果不如持說四句能趣菩提法華經云若於外相求之雖經萬劫終不能得教中云若見有身可捨即是不了蘊空昔罽賓國王仗劍諸師子尊者問曰師得蘊空否尊者曰已得蘊空王曰可施我頭尊者曰身非我有何況頭乎王遂斬之白乳高丈餘王臂自落是知人法俱空不應住色布施所以尊者不畏於死也傅大士云法性無前後無中非故新蘊空非實體憑何見有人故捨身命布施即與菩提轉不相應蓋謂不見佛性縱施身命如恆河沙數何益於事傅大士云施命如沙數人天業轉深既掩菩提相能障涅槃心猿猴提水月䕞𦿆捨花針愛河浮更沒苦海出還沉為他人說其福甚多一念見性人法俱空即名正見且為人說此經偈自利利他所得淨妙無相無為功德無有限量川禪師云兩彩一賽頌曰伏手滑鎚不換劍善使之人皆總便不用安排總見成箇中須是英靈漢囉囉哩哩囉囉山花笑野鳥歌此時如得意隨處薩婆訶離相寂滅分第十四直下頓空離諸形相既離形相寂滅現前頌曰冷灰豆爆口難開脫盡皮膚骨出來瓦解氷消藏不得夜深明月上樓臺爾時須菩提聞說是經至未曾得聞如是之經深解義趣心悟真空無相義趣也須菩提聞說是經了悟人法二空即得中道之理歎其希有感極涕零也傅大士云聞經深解義心中喜復悲昔除煩惱障今能離所知遍計於先了圓成證此時宿乘無閡慧方便勸人持未曾得聞者昔得慧眼於有見空今聞是經於空亦遣是了中道將欲起教以示未來也川禪師云好笑當面諱却頌曰自小來來慣遠方幾回衡嶽過瀟湘一朝踏著家鄉路始覺途中日月長世尊若復有人得聞是經至是故如來說名實相信心清淨信本來心無法可得不起妄念心常空寂湛然清淨也傅大士云未有無心境曾無無境心境忘心自滅心滅境無侵經中稱實相語妙理能深證知惟有佛小聖詎能任即生實相者豁然了悟萬法由此淨心建立是名實相成就第一希有功德迷即佛是衆生悟即衆生是佛生佛道齊無法等比經以福兼德言者屢矣而此獨言功德不及福者是功成果滿之時則其福為不足道所以壇經有功德在法身中非在於福也即是非相者實相無相故言為非不是無實相如龜毛兔角只說龜無毛兔無角不說無龜毛兔角只說實相無相不說無實相也達磨云若解實相即見非相若了非相其色亦然當於色中不生色體於非相中不礙有也猶水中鹽味色裏膠青決定是有不見其形正謂此也傅大士云衆生與壽者蘊上立虗名如龜毛不實似兔角無形川禪師云山河大也甚處得來頌曰遠觀山有色近聽水無聲春去花猶在人來鳥不驚頭頭皆顯露物物體元平如何言不會只為太分明世尊我今得聞如是經典至是人即為第一希有若人心常空寂湛然清淨不著諸相悟住無所住心了得無所得法是為第一希有川禪師云行住坐臥著衣喫飯更有甚麼事頌曰氷不熱火不寒土不濕水不乾金剛腳踏地幡竿頭指天若人信得及北斗面南看何以故此人無我相至離一切諸相即名諸佛即是非相前言無相即是滅色以明空義後言非相即是了悟我人衆生壽者四相本來不生故名實相離一切相即名諸佛謂語實相者更無等比當知是人不著二邊不處中道一切無住離此諸相則成正覺又云離相清淨解悟三空契合實相究竟涅槃三空之義初即人空次即法空後即空空三世如來同證此理故名為佛傅大士云空生聞妙理如蓬植在麻凡流信此法同火出蓮花恐人生斷見大聖預開遮如能離諸相定入法王家川禪師云心不負人面無慚色頌曰舊竹生新筍新花長舊枝雨催行客路風送片帆歸竹密不妨流水過山高豈礙白雲飛佛告須菩提如是如是至當知是人甚為希有如是如是者佛以須菩提所解空義善契如來之法意也不驚不怖不畏者心若空寂湛然清淨等於虗空有何驚怖甚為希有者謂上根器得聞是經諦聽受持永無退轉當知是人甚為希有傅大士云如能發心者應當了二邊涅槃無有相菩提離所緣無乘及乘者人法兩俱捐欲達真如理應當識本源川禪師云只是自家底頌曰毛吞巨海水芥子納須彌碧漢一輪滿清光六合輝踏得故關田地穩更無南北與東西何以故須菩提如來說至是名第一波羅蜜第一波羅蜜若悟非相即達彼岸實相無二故名第一非第一波羅蜜了悟人法俱空即無生死可度亦無彼岸可到何處更有第一故云非第一也是名第一波羅蜜悟一切法即知諸法皆是假名法華經云但以假名云引導於衆生於斯了悟能入見性之門是名第一波羅蜜也故知假名如將黃葉作金止小兒啼二乘之人聞說假名將謂是實執著修行欲離生死不知即無生死可離傅大士云波羅稱彼岸於中千種名高卑緣妄識次第為迷情焰裏尋求水空中覓響聲真如何得失今始號圓成川禪師云八字打開兩手分付頌曰是名第一波羅蜜萬別千差從此出鬼臉神頭對面來此時莫道不相識須菩提忍辱波羅蜜至衆生相壽者相應生嗔恨忍辱者六度之一也前云捨身命之福報是生死苦因不及持說之福此之行忍亦捨身命不成苦因者何耶蓋能達法無我到於彼岸也說非忍辱波羅蜜者了悟人法二空即無忍辱之相是達我人衆生壽者非相故云非忍辱也如我昔為歌利王割截身體如來設教方便門多若作教相言之只是依文設教為歌利王割截支解曾無一念嗔恨之心肇法師云五蘊身非有四大本來空將頭臨白刃一似斬春風若以諸大宗師言之即為先說有為權教後顯無為實理歌者是慧之別名利者刀也非謂世間之刀王者心也是用慧刀割截無明煩惱之身體也應生嗔恨謂色身與法身即不同也當知割截之時不見有身相亦不見有我人衆生壽者四相何處更有嗔恨也華嚴經云譬如虗空於十方中求不可得然非無虗空菩薩之心亦復如是太陽安禪師舉火問僧云會麼僧云不會師云起則遍周沙界滅則了無所得龐居士問馬祖云不與萬法為侶者是甚麼人祖云回光自照看待你一口吸盡西江水然後向你道圜悟禪師云參得此語透者目前萬法平沉無始妄想蕩盡又云大空無外大象無形盡世界撮來如粟米粒總虗空似掌中珠可以拽新羅國與波斯國鬪額直得東勝神洲射箭西瞿耶尼中垛所以道髑髏長千世界鼻孔摩出家風若是未出陰界尚帶見聞知覺恁麼說話一似鴨聽雷鳴隔靴抓癢直饒脫却根塵去却機境尚餘一線路在且二途不涉一句作麼生道還委悉麼佛殿階前石獅子大洋海裏鐵崑崙川禪師云智不責愚頌曰如刀割水似火吹光明來暗去那事無妨歌利王歌利王誰知遠烟浪別有好思量須菩提又念過去於五百世至無衆生相無壽者相忍辱仙人如來五百世中修忍辱波羅蜜行欲令一切衆生成就忍辱波羅蜜法不著諸相見一切人迷悟賢愚貧富平等恭敬不生輕慢以至惡罵捶打皆悉能忍反生歡喜不生嗔恨之心圜悟禪師云大凡為善知識應當慈悲柔和善順接物以平等無諍自處彼以惡聲色來加我非理相干訕謗毀辱但退步自照於己無嫌一切勿與較量亦不嗔恨只與直下坐斷初如不聞見久之魔孽自消耳若與之較即惡聲相反豈有了期又云見性之人聞人毀謗如飲甘露心自清涼不生煩惱則能成就定慧之力不被六賊盜竊家寶功德法財遂從此增長也傅大士云頻經五百世前後極時長承仙忍辱力今乃證真常川禪師云目前無法從教柳緑花紅耳畔無聞一任鶯啼燕語頌曰四大元無我五蘊悉皆空廓落虗無理乾坤萬古同妙峯嶷嶷常如故誰管顛號刮地風是故須菩提菩薩應離一切相至三藐三菩提心應離一切相者心常空寂不生起滅湛然清淨是離一切相也川禪師云是即此用離此用頌曰得之在心應之在手雪月風花天長地久朝朝雞向五更啼春來處處山花秀不應住色生心至為利益一切衆生應如是布施不應住色聲香味觸法生心者心住六塵即著諸相取捨愛憎無有休期應生無所住心者心無所住隨處解脫內外根塵悉皆銷殞一切無心即無所住也華嚴經云一切境界不生染著淨身口意住無礙行滅一切障世間受生皆由著我若離此著即無生處趙州云我見百千億箇盡是覓作佛漢子於中覓箇無心底難得訥首座云心本無形因塵有相塵滅心滅真心湛然常察禪師心印頌云問君心印作何顏心印何人敢授傳歷劫坦然無異色呼為心印早虗言須知體似虗空性將喻紅爐火裏蓮莫謂無心云是道無心猶隔一重關圜悟禪師云在家菩薩修出家行如火中生蓮蓋名位權勢意氣卒難調伏而況火宅煩擾煎熬百端千緒除非自己直下明悟本性妙圓到大寂大定休歇之場方能放下廓爾平常徹證無心觀一切法如夢幻泡影空豁豁地隨時應節消遣將去隨自己力量轉化未悟同入無為無事法性海中則出來南閻浮提打一遭必不為折本也黃蘗云供養十方諸佛不如供養一箇無心道人夫無心者如如之體內如木石不動不搖外如虗空不塞不礙是名佛也又恆沙者即以沙言諸佛菩薩釋梵諸天步履而過沙亦不喜牛羊蟲蟻踐踏而行沙亦不怒珍寶馨香沙亦不貪糞溺臭穢沙亦不惡此則無心之心離一切相衆生諸佛更無差別但能無心則便是究竟也若心有住即為非住真如之心本無所住若不住諸法相即與道相應若住於法即違正教既違正教即為非住也不應住色布施菩薩不見有身可捨隨見一切愚癡貧賤之人毀罵捶打需索財物若能隨順其意令生歡喜不生嗔恨之心即是布施之義若祇分辨是非顧惜財物阻抑其意令生嗔恨即不名布施也又云凡夫不肯空心恐落於空不知自心本空愚人除事不除心智者除心不除事菩薩心如虗空一切俱捨所作福德皆不貪著然捨有三等內外身心一切俱捨猶如虗空無所貪著然後隨方應物能所皆忘是為大捨若一邊行道布德一邊施捨無希望心是為中捨若廣修衆善有所希望聞法知空遂乃不著是為小捨傅大士云菩薩懷深智何時不帶悲投身飼餓虎割肉濟鷹饑精勤三大劫曾無一念疲如能同此行皆得作天師應如是布施者儉於自己奢於他人是名利益一切衆生若人心口相應行解一般是名利益於自己也又云所作依他性修成功德林終無趣寂意惟有濟羣心行悲悲廣大用智智能深利他兼自利小聖詎能任川禪師云有佛處不得住無佛處急走過三十年後莫言不道頌曰朝遊南嶽暮往天台追而不及忽然自來獨行獨坐無拘繫得寬懷處且寬懷如來說一切諸相至一切衆生即非衆生如來說我人等相畢竟可破壞非真實體一切衆生盡是假名若離妄心即無衆生可得故言即非衆生是以若能秉持律儀修行善法而用布施饒益衆生不得住於諸相也川禪師云別有長處不妨拈出頌曰不是衆生不是相春暖黃鶯啼柳上說盡山河海月情依前不曾空惆悵休惆悵萬里無雲天一樣須菩提如來是真語者至不誑語者不異語者迷則種種皆妄故不真不實不如有誑有異悟即一切真一切實一切如不誑不異也又云真語者一切含生皆有佛性也實語者一切法空本無所有也如語者一切萬法本來不動也不誑語者聞如是法皆得解脫也不異語者一切萬法本自空寂將何為異也傅大士云衆生與蘊界名別體非殊了知心是幻迷情見有無真言言不妄實語語非虗如終無變異性相本來如川禪師云知恩者少負恩者多頌曰兩箇五百是一貫阿爺元是丈夫漢分明對面對渠言爭奈好心無好報真語者實語者呵呵呵喏喏喏須菩提如來所得法此法無實無虗法即以心傳心何法不因心之所立如來以無所得心而得夫真空無相法此法即此心真體言無實者心體空寂無相可得也無虗者內有河沙功德用而不竭也欲言其實無形可觀無相可得欲言其虗見能作用神妙無方是故不可言有不可言無有而不有無而不無言辭不及其惟聖人乎若不離相修行無由達此法也傅大士云證空便為實執我乃成虗非空亦非有誰有復誰無對病應須藥無病藥還袪須依二空理頴脫入無餘川禪師云水中鹽味色裏膠青頌曰硬似鐵軟如酥看時有覓還無雖然步步常相守要且無人識得渠咦須菩提若菩薩心住於法至無量無邊功德如人入暗即無所見者衆生之心本自無住無住之心即見諸法實相名為菩薩二乘之人心住於法不見諸法實相背菩提路何異凡夫如人背明而入暗室如人有目日光明照見種種色者二乘之人不見色而住色譬如不見坑穽而墜坑穽菩薩見色而不住色譬如見坑穽而不墜坑穽一切諸法但有假名二乘之人為無慧眼不辨真假菩薩即有慧眼見種種色悉皆無相故達磨云不見色即是見色耳逍遙翁云所見有是有不是此世間妄眼無是無不是此出世真眼所知有可有不可此世間妄心無可無不可此出世真心也當來之世者即是如來滅後後五百歲中濁惡之時也即為如來以佛智慧者若人心常精進讀誦是經即慧性漸開當了悟實相人法二空不被一切善惡凡聖諸境惑亂即同如來智慧性也悉知悉見是人成就功德者三世諸佛無不知見了悟之人仰尊顏目不暫捨心常精進無有間斷也受持讀誦者行解相應謂之受勇猛精進謂之持心不散亂謂之讀見此不迷謂之誦為人解說謂已悟人能見自性方便為人解說此經令悟實相成無上道此為法施無所住相功德無有邊際勝前百千萬億劫以身布施功德百千萬倍謂彼雖受無量福報乃世間福耳受世間福者乃染煩惱之因又因心作惡業聞此經典信心不逆則自此種諸善根日見增長愈久而愈盛則為出世間福故勝於彼無量無數也川禪師云人天福報即不無佛法未夢見在頌曰初中後發心同功德無邊等莫窮爭似信心心不立一拳打破大虗空須菩提以要言之至為發最上乘者說明此法門所有功德過心境界故不可以心思過言境界故不可以口議若人於此經典了悟人法二空深明實相功德廣大即同佛心無有邊際不可稱量也為發大乘者說謂智慧廣大能見自性色空俱遣不著二邊二邊既無即無中道可立不染萬境即是大乘菩薩所行之道為發最上乘者說謂不見垢穢可厭不見清淨可求無遣可遣亦不言無遣無住不住亦不言無住心量廣大廓若虗空無有邊際即是最上乘諸佛地位也黃蘗云如來現世欲說一乘真法則衆生不信興謗沒於苦海若都不說則墮慳貪不為衆生普捨妙道遂談方便說有三乘乘有大小得有淺深皆非定法故云唯有一乘道餘二則非真也川禪師云如斬一握絲一刀一切斷頌曰一拳打倒化城關一腳躍翻玄妙棊南北東西信步行休覔大悲觀自在大乘說最上說一棒一條痕一掌一握血若有人能受持讀誦至阿耨多羅三藐三菩提廣為人說知見是人皆得成就不可思議功德者此謂上根器人深明此經了悟佛意持此大乘經典為人解說令諸學者各見自性無相之理得見本源自心是佛當知此人功德無有邊際不可稱量也馬祖云汝等諸人須信自心是佛此心即是佛心佛國白禪師云心心即佛佛心心佛佛心心即佛心心佛悟來無一物將軍止渴望梅林圜悟禪師云即心是佛已是八字打開非佛非心重問當陽點破不尋其言一直便透方見古人赤心片片若也躊蹰則當面蹉過了也心佛頌云佛即心兮心即佛心佛從來皆妄物若知無佛復無心始是真如法身佛佛佛佛沒榜樣一顆圓光八萬象無體之體乃真體無相之相即實相非色非空非不空不動不靜不來往無異無同無有無難取難捨難指望內外圓明到處通一佛國在一沙中一粒沙含大千界一箇身心萬箇同知之須會無心法不染不淨為淨業善惡千端無有無便是南無大迦葉黃蘗云汝但除外凡情聖境心外更別無佛祖師西來直指一切人全體是佛汝今不識執凡執聖向外馳騁返自迷心所以向汝道即心是佛一念情生即墮異趣無始以來不異今日無有異法故名成等正覺即為荷擔如來阿耨多羅三藐三菩提者聞經解義如說修行廣為人說無相之法令諸學者悟明心地能行無相無著之行開發心中智慧光明離諸塵勞妄念共成無上菩提當知此人負荷自性如來阿耨多羅三藐三菩提在於身內也傅大士云遍計於先了圓成證此時宿乘無礙慧方便勸人持川禪師云劈開太華手須是巨靈神頌曰堆山積嶽來一一盡塵埃眼裏瞳人碧胸中氣若雷出邊沙塞靜入國貫英才一片寸心如海大波濤幾見去還來何以故須菩提至不能聽受讀誦為人解說小法者小乘法也凡夫愚鈍不能聽信廣學無上菩提空修福德六道輪回因果之法縱使強學執著多聞為人解說被明眼人著手忙腳亂一場敗闕保寧勇禪師云顏色規模恰似真人前拈弄越光新及乎入火重烹煉到了終歸是假銀黃蘗云古人心利才聞一言便乃絶學所以喚作絶學無為間道人也今時人只欲多知多解廣求文義喚作修行不知多知多解翻成壅塞皆為毒藥盡向生滅中取真如之中都無此事從前所有一切解處盡須併却令空即是空如來藏更無纖塵可有即是破有法王出現世間亦云我於然燈佛所無有少法可得此語只為空你情解知量但消融表裏情盡都無依執是無事人三乘教網只是應機之藥隨宜所說臨時施設各各不同但能了知即不被惑第一不得於心境上守文作解何以如此實無有定法如來可說我此宗門不論此事但只息念忘慮便休更不用思前慮後又云學般若人不見有一法可得絶意三乘唯一真實不可證得謂我能證能得者皆增上慢人法華會上拂衣而去者皆斯徒也是故佛言我於阿耨多羅三藐三菩提實無所得默契而已學者但止於正法修行放下我人衆生壽者四相即不被一切諸境惑亂若著四相則墮邪見故不能聽受讀誦況能為人解說修行正法眼藏云若欲修行當依正法心體離念相等虗空不落聖凡身心平等如是修者是為正法也川禪師云仁者見之謂之仁智者見之謂之智頌曰不學英雄不讀書波波役役走長途娘生寶藏無心用甘作無知餓死夫爭怪得別人須菩提在在處處至以諸花香而散其處在在處處言所在之處不一也一切衆生六根運用種種施為常在法性三昧之中若悟此理即在在處處有此經也天人阿修羅天者逸樂心人者善惡心阿修羅者瞋恨心但存此心不得解脫所應供養者若無天人阿修羅心是名供養即為是塔者解脫之性巍巍高顯便是如來真身舍利故云是塔也以諸香花而散其處者常於解脫性中開敷知見熏植萬行即法界性自然顯現川禪師云鎮州蘿蔔雲門糊餅頌曰與君同步又同行起坐相將歲月長渴飲饑飱常對面不須回首更思量能淨業障分第十六若能心常清淨宿生業障永盡消除頌曰業由心造心由誰心罪當知誰所為直下罪忘心滅處覺天心月燦光輝復次須菩提若善男子至得阿耨多羅三藐三菩提上明生善今明滅惡先世造作定業不可逃避以行般若故不特易重為輕且得正覺故言若人受持讀誦此經應合得人恭敬今復有疾患貧窮業障反為人所憎惡世人不達先業將謂誦經為善渾無應驗遂生疑惑殊不知若非經力即墮惡道以今世人輕賤故折三途之報速得無上菩提張無盡云四序炎涼去復還聖凡只在剎那間前人罪業今人賤倒却前人罪業山傅大士云先身有報障今日受持經暫被人輕賤轉重復還輕若了依他起能除遍計情常依般若觀何慮不圓成川禪師云不因一事不長一智頌曰讚不及毀不及若了一萬事畢無缺無餘若太虗為君題作波羅蜜須菩提我念過去至乃至算數譬喻所不能及阿僧祇梵語也華言無央數那由陀華言一萬萬於無量無央數劫在然燈佛先則釋迦佛說此經時去然燈佛已無量無數矣又於其先遇八百四千萬億那由他諸佛出世則其劫數不勝其多供養如是諸佛其功德終不可及此經功德以彼雖供無數諸佛求福而已未離生死自性若迷福何可救不如有人於此經典得悟真性勝前所得功德百千萬倍達磨對梁武帝云造寺寫經供養布施功德只獲人天小果實非功德也川禪師云功不浪施頌曰億千供佛福無邊爭似常將古教看白紙上邊書黑字請君開眼目前觀風寂寂水漣漣謝家人祇在漁船須菩提若善男子善女人至果報亦不可思議所得功德我若具說者謂說悟後淨妙境界也前為樂小法者為說降住小乘之法欲令悟入尚猶不信若便為說見性大乘之法密義難思狂亂不信徒使其狐疑也義者般若之義果報者所得功德也當知是經等則總結此經福果之體皆幽邃而難測蓋經義乃福所依體佛果為菩提所依體以皆無相故絶言思也長水云自第三乃至第十迤𨓦次第五度校量謂外財兩度內財兩度佛因一度第一以一大千界寶施不及持說第二以無量大千界寶施不及持說第三以一河沙身命布施不及持說第四以無量沙數身命布施不及持說第五以如來因地供佛功德不及持說至此第五是校量之極更無譬喻可以比況故總結云經義果報不可思議也謝靈運云萬行淵源義理難測菩提妙果豈有心之能議川禪師云各各眉毛眼上橫頌曰良藥多苦口忠言多逆耳冷暖自知如魚飲水何須他日待龍華今朝先授菩提記究竟無我分第十七一切法直下究竟本無我體頌曰究竟無我絶三玄真空妙理本無傳人人本有黃金相分付東君仔細參爾時須菩提白佛言世尊至無有一衆生實滅度者云何應住云何降伏其心注見善現起請分中當生如是心者謂二乘之人執著諸相起諸妄念如來指示令其心常空寂湛然清淨也馬祖云常教心如迷人不辨萬有百丈云心如虗空相學始有成也黃蘗云但淨其心更無別法此即真佛佛與衆生一心無辨猶如虗空無雜無染如大日輪照四天下日升之時明遍天下虗空不曾明日暗之時暗遍天下虗空不曾暗明暗之境自相凌奪虗空之性廓然不變佛與衆生心亦如是我應滅度一切衆生者佛言我今欲令一切衆生除滅妄心令見真性白樂天云淡然無他念虗靜是吾師圭峰禪師云覺諸相空心自無念念起即覺覺之即無修行妙門惟在此也慈受云有利根者一撥便轉性頑鈍者只在夢中山僧有箇省磕睡底道理不免傾心吐膽而為諸人說破良久曰且勤照管鼻孔愚者若見此一如路逢客智者見點頭恰如饑得食滅度一切衆生已而無有一衆生實滅度者此謂不可見有衆生是自己度者若有此念即著我人衆生壽者四相即非菩薩清淨心也川禪師云有時因好月不覺過滄洲頌曰若問云何住非中及有無頭無纖草蓋足不履閻浮細似鱗方出輕如蝶舞初衆生滅盡知無滅此是隨流大丈夫何以故若菩薩有我相至阿耨多羅三藐三菩提者即非菩薩謂二乘之人執著我人衆生壽者四相解注已在大乘正宗分中實無有法謂初悟人尚有微細四相也但少有悟心是我相見有智慧能降伏煩惱是人相見降伏煩惱竟是衆生相見清淨心可得是壽者相不除此念皆是有法故云實無有法發阿耨多羅三藐三菩提者傅大士云空生重請問無心為自身欲發菩提者常了現前因行悲疑似妄用智最言真度生權立我證理即無人川禪師云少他一分也不得頌曰獨坐翛然一室空更無南北與西東雖然不借陽和力爭奈桃花一樣紅龍舒居士云此分大槩如第三分所言須菩提於此再問者無非為續求聽者問耳經中多有如此不必以前為破情顯智此則忘智顯理前淺後深穿鑿求解佛再答之唯增實無有法發阿耨多羅三藐三菩提者一句上既言發阿耨菩提者當生如是心生如是心則是法矣若無法烏能得見真性而成佛然此乃言實無有法發阿耨菩提者何也蓋上言當生如是心者是心亦非真性中所有亦屬妄耳故此言實無有法其意謂究其實則真性無此佛恐弟子誤認所謂當生如是心者為真實故特於此說破以為非實也然則非徒本無一切衆生而發此求真性之心者亦本無法蓋真性中本來蕩然空寂所謂一法不立者是也須菩提於意云何如來於然燈佛至佛言如是如是如來佛自謂也言我於然燈佛所有法得三菩提不須菩提言若有般若了悟心在即是有法尚存所得之心故云無有法得三菩提也佛言如是如是者善契如來之法意也川禪師云若不同床睡爭知被底穿頌曰打鼓弄琵琶相逢兩會家君行楊柳岸我宿渡頭艖江上晚來秋雨過數峰蒼翠接天霞須菩提實無有法至當得作佛號釋迦牟尼若有一切法是有一切心故云即非佛法若無一切法是無一切心云何不是佛故龍牙和尚云深念門前樹能令烏泊棲來者無心喚去者不慕歸若人心似樹與道不相違與我授記當得作佛號釋迦牟尼者如因智慧而得見性若有能所之心即是有法可得性同凡夫如何得授記耶若必有法可得則然燈佛已傳之矣何待授記故無記可授是名授記若於心上無纖粟停留即是無法可得自性清淨故云來世當得作佛慈受禪師云一顆靈丹大似拳服來平地便升仙塵緣若有絲毫在蹉過蓬萊路八千傅大士云人與法相待二相本來如法空人是妄人空法亦袪人法兩俱遣授記可非虗一切皆如幻誰言得有無川禪師云貧似范丹氣如項羽頌曰上無片瓦下無劄錐日來月往不知是誰咦何以故如來者即諸法如義如來者即真如也真如不離諸法凡夫心存取捨分別諸法所以濁亂不得自如佛心若大虗空即一切諸法本來清淨如中天杲日歷歷分明於諸法上都無取捨分別即是諸法如義又云若不修因即無證果雖無因果法之可得諸法皆如如理即佛傅大士云法性非因果如理不從因謂得然燈記寧知是舊身經云文殊及淨名對談不二如何是不二不得動著川禪師云住住動著即三十捧頌曰上是天兮下是地男是男兮女是女牧童撞著著牛兒大家齊唱囉囉哩是何曲調萬年歡若有人言如來得阿耨多羅至於是中無實無虗無上正覺佛之真性也性則吾心本有法則從外施設佛假諸法斷除外妄以明真性豈謂於法有所得而名為真性耶故如來了無所得而可以得言者菩提無上道耳而菩提無上道有真空妙理在乎其間故言無實無虗無實者真空無分別也境界經云諸欲不染故敬禮無所觀無虗者妙用也具河沙德用也川禪師云富嫌千口少貧恨一身多頌曰生涯如夢若浮雲活計都無絶六親留得一雙青白眼笑看無限往來人是故如來說一切法皆是佛法一切世法皆是佛法蓋如來真如之性非別有體即一切色等諸法離性離相唯佛與佛乃能證知故云皆是佛法涅槃經云佛即是法法即是佛馬祖云一切衆生從無量劫來不出法性三昧長在法性中著衣喫飯言談祇對六根運用一切施為盡是法性不解還源所以隨名逐相迷情妄起造種種業若能一念回光返照全體聖心何處不是佛法川禪師云明明百草頭明明祖師意頌曰曾造逡巡酒能開頃刻花琴彈碧玉調爐煉白珠砂幾般伎倆從何得須信風流出作家須菩提所言一切法者即非一切法是故名一切法謂於者法心無所得了諸法空本無一切法也法華經云諸法從本來常自寂滅相故古德云用即知而常寂不用即寂而常照方契妙覺是故名一切法也川禪師云上大人丘乙己頌曰是法非法不是法死水藏龍活鱍鱍是心非心不是心畗塞虗空古到今祇者是絶追尋無限野雲風捲盡一輪明月照天心須菩提譬如人身長大至即為非大身是名大身色身有相為非大身法身無相廣大無邊是名大身黃蘗云虗空即法身法身即虗空是名大身也川禪師云喚作一物即不中頌曰天産英靈六尺軀能文能武善經書一朝識破娘生面方信間名滿五湖須菩提菩薩亦如是至無我無人無衆生無壽者梵語菩薩華言覺衆生謂我當滅度無量衆生即不名菩薩者若以衆生為有而我化之成佛以得滅度如作此見則不可名為覺衆生以一切衆生於真性本無惟從業緣中現不可以為有亦如大身不為真實徒有虗名而已傅大士云名因共業變萬像即微生若悟真空色悠然獨有名實無有法名為菩薩者一切空寂本來不生不見有生死不見有涅槃不見有善惡不見有凡聖不見一切法是名見法正見之時了無可見無四相可得即是菩薩維摩經云法無衆生離衆生垢故法無有我離我垢故法無壽命離生死故法無有人前後際斷故此真空無相法佛說一切法者此耳外此則佛無所說川禪師云喚牛則牛喚馬即馬頌曰借婆衫子拜婆門禮數周旋已十分竹影掃階塵不動月穿潭底水無痕須菩提若菩薩作是言至如來說名真是菩薩我當莊嚴佛土是不名菩薩者妙定經云若人造得白銀精舍三千大千世界雖有無量布施福德心有能所即非菩薩不如一念無能所心所得功德勝前功德百千萬倍即非莊嚴是名莊嚴謂如來所說者莊嚴心佛土也心土本來清淨無相實無有法可得阿耨多羅三藐三菩提實無有法名為菩薩豈復取莊嚴相逍遙自在無纖毫罣礙云何是莊嚴云何不是莊嚴故云即非莊嚴是名莊嚴也通達無我法謂於諸法相無所滯礙是名通達若作有所能解是名我相若作無所能解湛然清淨是名無我故云真是菩薩僧問馬祖云作何見解則得達道答云自性本來具足但於善惡事上不滯方喚作修道人取善捨惡觀空入定皆屬造作更向外馳去家轉踈轉遠一念妄想便是三界生死根本但不起一念是除生死根本即得法王無上珍寶川禪師云寒則普天寒熱則普天熱頌曰有我元無我寒時燒暖火無心似有心半夜拾金針無心無我分明道不知道者是何人一體同觀分第十八萬法同歸一體更無異觀頌曰人法俱忘水月秋更無纖粟挂心頭饑來喫飯困來睡緑水青山一目收須菩提於意云何至如是世尊如來有佛眼一切凡夫皆具五眼而被迷心蓋覆不能自見若無迷心忘念即得翳障退滅五眼開明見一切色也化身觀見為肉眼普照大千為天眼智燭常明為慧眼了諸法空為法眼自性常覺為佛眼華嚴經云肉眼見一切色故天眼見一切衆生心故慧眼見一切衆生諸根境界故法眼見一切法如實相故佛眼見如來十力故又云若以無相為法身者名為慧眼而見如來指空論有假立名相名為法眼而見如來若了有無即非有無二邊寂滅全體法身周遍法界者具足佛眼而見如來僧問尊宿云觀音菩薩用許多手眼作麼答云通身是手眼若人於這裏薦得一眼也無豈更落三落四然如是須是箇漢始得川禪師云盡在眉毛下頌曰如來有五眼張三秪一雙一般分皂白的的別青黃其間些子淆訛處六月炎天下雪霜須菩提於意云何至若干種心如來悉知恆河沙數者謂諸恆河中沙一沙為一世界欲明衆生有種種妄念故舉無窮之沙以為喻耳楞嚴經云琉璃光法王子觀世間衆生皆是妄緣風力所轉觀世動時觀身動止觀心動念諸動無二等無差別此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄也若干種心如來悉知者眼耳鼻舌身意若起心動念處皆是國土於國土中所有衆生若干種種差別之心心數雖多總名妄心然此妄心乃自真性中現則有形相既有形相故可得而知故云悉知若寂然如虗空則無得而知矣川禪師云曾為浪子偏憐客慣愛貪杯識醉人頌曰眼觀東南意在西北將謂矦白更有矦黑一切衆生一切心盡逐無窮聲與色咄何以故如來說諸心皆為非心是名為心覺妄之心即是非心本無妄念不起妄心即是自性本心故云是名為心即是菩薩心亦名涅槃心亦名大道心亦名佛心故臨濟云若一念心能解縛此是觀音三昧法川禪師云病多記藥性頌曰一波才動萬波隨似蟻循環豈了期今日為君都割斷出身方號丈夫兒所以者何須菩提至現在心不可得未來心不可得謂三世心無性可得故可從緣生肇法師云聞說諸心謂有實心故須破遣明三世皆空故云過去已滅未來未至現在虗妄三世推求了不可得蓋真心常住自無量無數劫來常一定而不變動豈有過去未來現在有此三心則是妄想從緣而起緣滅還無不可得者謂無也言此三心本來無有乃從緣而有耳故云若悟無相無事平常真心即法體空寂不生不滅湛然清淨豈有前念今念後念可得也馬祖云道不用修但莫污染何謂污染但有生死造作趣向皆是污染若欲直會其道平常心即是道何謂平常心無造作無是非無取捨無愛憎無凡聖是故經云非凡夫行非聖賢行是菩薩行趙州問南泉云如何是道泉去平常心是道佛印禪師頌云欲識平常道天真任自然行船宜舉棹走馬即加鞭若遇饑來飯還應困即眠盡從緣所得所得亦非緣傅大士云依他一念起俱為妄所行便分六十二九百亂縱橫過去滅無滅當來生不生若能如此觀真妄坦然平川禪師云低聲低聲直得鼻孔裏出氣頌曰三際求心心不見兩眼依然對兩眼不須遺劍刻舟尋雪月風花常見面法界通化分第十九以無福德為福德充滿法界通達無邊頌曰寶施無邊豈性同何如見道脫凡籠打開自己光明藏盡在毫端一化中須菩提於意云何至如來說得福德多布施雖多只是有礙之寶不及無為清淨功德是故如來不說多也若有菩薩以盧那含中七覺菩提持齊禮讚從其心燈化生功德不生不滅堅如金剛乘香花雲人無邊界起光明臺供養十方一切諸佛此是無為功德見性之施同於虗空無有邊際川禪師云尤勝別勞心頌曰羅漢應供薄象負七寶珍雖然多濁富爭似少清貧罔象只因無意得離婁失在有心親離色離相分第二十有色有相從緣妄生離妄即得見性頌曰法身體若太虗空萬象難教混一同花笑鳥啼瞞不得難將正眼著邪中須菩提於意云何至即非具足是名諸相具足如來法身無為應身起用固非色相可見而未嘗離於色相而不可見凡夫不著有即著空有此斷常二見謂觀空莫非見色見色莫不皆空即是具足色身具足諸相非具足也空色一如有無不異方可能觀無身而見一切身無相而見一切相是名色身具足諸相具足也僧問趙州云狗子有佛性也無州云狗子無佛性僧云蠢動含靈皆有佛性為甚麼狗子無佛性州云為他有業識在夫業識之人種種著於有起諸妄想者名顛倒知見種種落於空都無所悟者名斷滅知見宿有善根之人無此顛倒斷滅二病能洞曉空有此名正真知見若悟此理乃可隨時著衣喫飯長養聖胎任運過時更有何事四祖謂牛頭融禪師云百千妙門同歸方寸恆沙妙德總在心源一切定門一切慧門一切行門悉皆具足神通妙用只在你心業障煩惱本來空寂一切果報性相平等大道虗曠絶思絶慮如是之法無缺無餘與佛無殊更無別法但只令心自在莫懷妄想亦莫歡欣莫起貪嗔莫生憂慮蕩蕩無礙任意縱橫不作諸善不造諸惡行住坐臥觸目遇緣皆是佛之妙用祖印明禪師云養就家欄水牯牛自歸自去有來由如今穩坐深雲裏秦不管兮漠不收傅大士云八十隨形好相分三十二應物萬般形理中非一異人法兩俱遣色心同一契所以證菩提實由諸相離川禪師云官不容針私通車馬頌曰請君仰面看虗空廓落無邊不見蹤若解轉身些子力頭頭物物總相逢非說所說分第二十一無法可說是名說法頌曰生前一句是如何開口分明蹉過他佛祖舌頭都坐斷啞人食蜜笑呵呵須菩提汝勿謂如來作是念至不能解我所說故既云如來色身相好不可得見如何為人說法然如來心常清淨語默皆如遇緣即施緣散即寂無說而說說即無說不達此意是為謗佛張無盡云非法無以談空非人無以說法此謂不同生滅之心有法可說也若有生滅心在而說法者是教一切人不能得見自性所以為不能解佛所說也如如居士云終日喫飯不曾咬著一粒米終日著衣不曾挂著一莖絲所以我佛橫說直說四十九年未曾道著一字若人有所說法直饒說得天花亂墜也落在第二著唯能坐斷十方打成一片非言語可到是名真說法也所以道墻壁瓦礫說禪浩浩古德頌云也大奇也大奇無情說法不思議若將耳聽終難會眼處聞聲方得知川禪師云是即是大藏小藏從甚處得來頌曰有說皆為諦無言亦不容為君通一線日向嶺東紅須菩提說法者無法可說是名說法說法者無法可說謂本來無法特為諸衆生隨緣而說耳此法豈真有耶衆生覺悟何用此法但虗名為說法而已謝靈運云教傳者說法之意也向言無說非杜默而不語但無存而說則說滿天下無乖理法之過無存謂不著諸相心無所住也傅大士云相寂名亦遣心融境亦亡去來終莫見語默永無妨智入圓成理身同法性常證真還了俗不廢是津梁川禪師云兔角杖龜毛拂頌曰多年石馬放毫光鐵牛哮吼入長江虗空一喝無蹤跡不覺潛身北斗藏且道是說法不是說法爾時慧命須菩提白佛言至說非衆生是名衆生此魏譯偈也長慶中僧靈幽入冥所指魏譯則存秦譯則無今存魏譯慧命善現解空第一與般若空慧相應以慧為命故稱慧命佛言若敬信佛法即著聖見非衆生也若不信佛法則著凡夫見非不衆生若起此二見者是不了中道須是凡聖皆盡不生兩頭方是真正見解故云衆生衆生者如來說非衆生是名衆生也川禪師云火熱風動水濕地堅頌曰指鹿豈能成駿馬言烏誰謂是翔鸞雖然不許纖毫異馬字驢名幾百般無法可得分第二十二悟性空故無法可得頌曰火裏尋氷謾自求敲冰取火更無由十虗縱汝爭拈得兩眼雙空當下休須菩提白佛言世尊至是名阿耨多羅三藐三菩提無有少法可得謂真性中元無有法可得若有少法可得亦是著相惟無所得則蕩然空空是故不可以形相求不可以言說求也志公云但有纖毫即是塵舉意便遭魔所擾經云若人欲識佛境界當淨其意如虗空學道之人但於一切諸法無取無捨見如不見聞如不聞心如木石刮削併當令內外清淨方是逍遙自在底人草堂清和尚云擊石乃出火火光終不炎碧潭深萬丈直下見青天逍遙翁云內覺身心空外覺萬事空破諸相訖自然無可執無可爭此是禪悅所謂大明了人勿令有秋毫許障礙微塵許染著堅久不渝便是無上士不動尊也琪禪師云念念釋迦出世步步彌勒下生分別現文殊之心運用動普賢之行門門而皆出甘露味味而盡是醍醐不出旃檀之林長處華藏之境若如此也行住坐臥觸目遇緣雖應用千差且湛然清淨川禪師云求人不如求己頌曰滴水生冰信有之緑楊芳草色依依春花秋月無窮事不妨間聽鷓鴣啼淨身行善分第二十三以無相清淨心修一切善法頌曰但自胸應無垢機任他長短是和非眼中著沙耳盛水妙行如如同道知復次須菩提是法平等至得阿耨多羅三藐三菩提是法平等無有高下者所謂是法乃真性也凡夫不見自性妄識分別自生高下諸佛是高衆生是下菩薩了悟人法二空上至諸佛下至螻蟻皆有佛性無所分別故一切法皆平等豈有高下也黃蘗云欲觀佛作清淨光明解脫之相觀衆生作垢濁暗昧生死之相作此解者歷恆河沙劫終不能得阿耨菩提又云心若平等不分高下即與衆生諸佛世界山河有相無相遍十方界一切平等無我人衆生壽者四相本源清淨心常自圓滿光明遍照故名為無上正等正覺也傅大士云水陸同真際飛行體一如法中何彼此理上起親疏自他分別遣高下執情除了斯平等性咸共入無餘修一切善法者若不能離諸相而修善法終不能解脫但離諸相而修善法即得阿耨多羅三藐三菩提也百丈云若人於一切事無染無著於一切境不動不搖於一切法無取無捨於一切時常行方便隨順衆生令皆歡喜而為說法令悟菩提真性此即名為修善法也川禪師云山高海深日生月落頌曰僧是僧兮俗是俗喜則笑兮悲則哭若能於此善參詳六六從來三十六須菩提所謂善法者如來說非善法是名善法不住相故即非善法無漏福故是名善法法華經云初善中善後善者初謂發善心時須是念念精進不生疑惑懈怠之心中謂常修一切善法令悟真性不著諸法相後謂即破善法直教一切善惡凡聖無取捨憎愛之心平常無事故云即非善法是名善法蓋凡夫執惡聲聞著善若不離善法又落兩頭機豈為平等也古德云了取平常心是道饑來喫飯困來眠又云常平等心如地廣大妙觀察智如日光明體用及此是佛境界川禪師云面上夾竹桃花肚裏侵天荊棘頌曰是惡非惡從善非善將逐符行兵隨印轉有時獨立妙高峰却來端坐閻王殿見盡人間祇點頭大悲手眼多方便福智無比分第二十四福智俱等虗空無物可比頌曰福智無邊豈度量人天路上福為強要離生死超三界惟誦金剛出世方須菩提若三千大千世界中至算數譬喻所不能及聚七寶布施如三千大千世界中須彌山王所得無量無邊福德此為住相布施終無解脫之期不如受持讀誦此經乃至四句偈等所得無住相淨妙功德勝前功德百千萬倍傅大士云施寶河沙數惟成有漏因不如無我觀了妄乃名真川禪師云千錐劄地不如鈍鍬一捺頌曰麒麟鸞鳳不成群尺璧寸珠那入市逐日之馬不並馳倚天長劍人難比乾坤不覆載劫火不能壞凜凜威光混太虗天上人間總不如咦化無所化分第二十五衆生性空雖化度衆生而實無所化頌曰自性衆生自性度癡人覔佛外邊求可憐拾翠拈紅客空在閻浮數日頭須菩提於意云何至如來即有我人衆生壽者既云是法平等無有高下云何如來却度衆生故偈云平等真法界佛不度衆生以名共彼陰不離於法界名即衆生假名也陰即五陰實法也此假名實法皆即法衆故云不離於法界既即法界凡聖一如故如來實無有衆生可度又云謂諸衆生起無量無邊煩惱妄想於一切善惡凡聖等見有取捨分別之心迷情蓋覆菩提之性佛出於世教令覺悟降六賊斷三毒除人我若能了悟人法二空無諸妄念心常空寂湛然清淨更不留纖毫滯礙即是見性實無衆生可化度也石霜禪師云休去歇去古廟香爐去枯木寒灰去一念萬年去如大死人去若能如此用心安有不成道也若有衆生如來度者即有我人衆生壽者謂此道人人具足箇箇圓成本來是佛與佛無異一切衆生皆是妄緣中現其實無有若言有衆生可度即著四相圜悟禪師云赤肉團上人人古佛家風毗盧頂門處處祖師巴鼻若也恁麼返照凝然一段光明非色非心非內非外行棒也打他不著行喝也驚他不得真得淨裸裸赤灑灑是箇無生法忍不退轉輪截斷兩頭歸家穩坐正當恁麼時不須他處覔祇此是西方傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處只這語聲是衆生但為業障深重與佛有殊若能回光返照一刀兩段即便見自性也若不因佛經教一切衆生無因自悟憑何修行得至佛地此是如來無所得心故云若有衆生如來度者即有我人衆生壽者相也川禪師云春蘭秋菊各自馨香頌曰生下東南七步行人人鼻直兩眉橫哆和悲喜皆相似那時誰敢問慈親還記得在麼須菩提如來說有我者至如來說即非凡夫如來既無我人等相云何有時稱我須知對所度衆生假名說我耳謂有我者即是凡夫非我者隨處作主應用無方故云凡是佛因佛是凡果境界經云三世諸佛皆無所有唯有自心既明因果無差乃知心外無法二乘之人執有我相欲離生死而求涅槃欲捨煩惱而求滅度是捨一邊不了中道乃同凡夫行也即非凡夫者一念清淨非凡非佛故云即非凡夫凡夫亦空迷者妄執但無執著即一切清淨耳川禪師云前念衆生後念佛佛與衆生是何物頌曰不現三頭六臂却能拈匙放筯有時醉酒罵人忽爾燒香作禮手把破沙盆身披錦羅綺做模打樣百千般驀鼻牽來祇是你嗄法身非相分第二十六如來清淨法身非屬形相頌曰三十二相黃金殿八十隨形瓔珞衣覷破如來真面目元將黃葉止嬰啼須菩提於意云何至以三十二相觀如來空生疑謂衆生是有可化成聖法身不無可以妙相而見之也川禪師云錯頌曰泥塑木雕兼彩𦘕堆青抹緑更粧金若將此是如來相笑殺南無觀世音佛言須菩提若以三十二相至爾時世尊而說偈言三十二相者應身相也觀如來者觀法身如來也善現初謂應身相好從法身流出若見相好即見法身故答以如是如是佛恐善現於應身取著不達法體又以轉輪聖王為難謂輪王雖具三十二相豈同如來法身故不應以相好觀如來也又云未達我人衆生壽者四相即是心有生滅生滅即是轉輪義王者心也雖修三十二淨行生滅心轉多終不契清淨本心與如來有別耳川禪師云錯頌曰有相身中無相身金香爐下鐵崑崙頭頭盡是吾家物何必靈山問世尊如王秉劍若以色見我以音聲求我是人行邪道不能見如來言我者此是法身真常淨我非色非聲無形無狀不可以心思不可以識識若以色見聲求心遊理外皆名邪見不見法身肇法師云所謂諸相煥目而非形八音盈耳而非聲應化非真佛亦非說法者法體清淨猶若虗空無有染礙不落一切塵境今且略舉聲色耳又云音聲色相本自心生分別之心皆落邪道若能見無所見聞無所聞知無所知證無所證體此妙理方見如來傅大士云涅槃含四德惟我契真常齊名八自在獨我最靈長非色非身相心識豈能量看時不可見悟理則形彰川禪師云直饒不作聲求色見亦未夢見如來在且道如何得見不審不審頌曰見色聞聲世本常一重雪上一重霜君今要見黃頭老走人摩耶腹內藏咦此語三十年後擲地有金聲在無斷無滅分第二十七依空即落空無生斷滅之見頌曰這點靈光亘古今幾回高顯幾回沉驀然摸著衣中寶呀地一聲更不尋須菩提汝若作是念至於法不說斷滅相如來不以具足相故者佛恐須菩提落斷滅見是故令離兩邊然性含萬法本自具足應用遍知一即一切一切即一去來自由無所礙此法上至諸佛下至含識本無缺少是名具足相也說諸法斷滅莫作是念者諸法性空空即是常是故不斷不滅若作念云無相而有道心者是斷一切行滅一切法此非中道也又云若作有相觀即是一邊見若不作有相觀即是斷滅法故知真如法性不是有不是無湛然不動觀與不觀皆是生滅故云莫作是念也於法不說斷滅相謂見性之人自當窮究此理若人空心靜坐百無所思以為究竟即著空相斷滅諸相朝太傅云諸佛說空法為治於有故若復著於空諸佛所不化故云大士體空而進德凡夫說空而退善當知有為是無為之體無為是有為之用也川禪師云剪不齊兮理還亂拽起頭來割不斷頌曰不知誰解巧安排揑聚依前又放開莫謂如來成斷滅一聲還續一聲來不受不貪分第二十八不受者縱有向甚麼處著不貪者愛欲之念不生頌曰寶聚恆河世界中一毫不受樂心空春敷萬卉青紅紫俄頃崢嶸不見蹤須菩提若菩薩以滿恆河至勝前菩薩所得功德知一切法無我謂一切萬法本來不生本來無我相所得福德即非七寶布施等福所能比也得成於忍者既知人法無我則二執不生成無生忍此乃勝前七寶布施菩薩夫萬法本來無性皆因自己之所顯發耳如眼對色謂之見耳對聲謂之聞見聞是根色聲是塵色聲未對之時我性常見常聞未曾暫滅色聲相對之時我性未嘗暫生此是菩薩了悟真性活鱍鱍地洞然同於太虗所以不曾生滅凡夫即被妄心所覆隨六塵轉即有生滅故塵起即心起塵滅即心滅不知所起滅心皆是妄念也若見六塵起滅不生即是菩提川禪師云耳聽如聾口說如啞頌曰馬下人因馬上君有高有下有疏親一朝馬死人歸去親者如同陌路人只是舊時人改却舊時行履處須菩提以諸菩薩不受福德故至故說不受福德不貪世間福德果報謂之不受又云菩薩所作福德不為自己止欲利益一切衆生此是無所住心即無貪著故云不受福德川禪師云裙無腰袴無口頌曰似水如雲一夢身不知此外更何親箇中不許容他物分付黃梅路上人威儀寂靜分第二十九四威儀中法身如如不動本來靜寂頌曰坐臥經行腳自擡登山涉水混塵埃看他下足分明處踏碎虗空無去來須菩提若有人言至亦無所去故名如來如來清淨法身遍滿虗空世界本無形相其現千百億身乃隨衆生業緣而有如鏡中像其實法身元無生滅豈有去來故不知其何所從來亦不知其何所從去華嚴經云上覺無來處去亦無所從清淨妙色身神力故顯現圓覺經云雲駛月運舟行岸移蓋謂月未嘗運岸未嘗移真如體性未嘗作止任滅皆人謬見耳又云知色聲起時即知從何而來知色聲滅時即知從何而去故色聲香味觸法自有起滅我心湛然豈有去來生滅相耶寂而常照照而常寂行住坐臥四威儀中無不清淨也川禪師云三門頭合掌佛殿裏燒香頌曰衲捲秋雲去復來幾回南嶽與天台寒山拾得相逢笑且道笑箇甚麼笑道同行步不擡一合理相分第三十世界微塵離合無性為顯此理頌曰一念未興相已成如臨寶鏡兩分明翻身踏碎潭心月相理元空擺手行須菩提若善男子善女人至即非世界是名世界微塵者妄念也世界者身之別名也微塵是因世界是果微塵世界者謂因果也然自己真性非因非果能與六道衆生為因果也謂自性是因六道是果故知微塵能起世界輪回由於一念雖見小善不可執著雖逢小惡必須除去且衆生於妄念中起貪瞋癡業妄受三界夢幻之果如彼微塵積成世界不知因果元是妄心自作自受一念悟來即無微塵世界何有故云即非微塵是名微塵即非世界是名世界若欲建立世界一任微塵熾然若欲除滅世界覺悟人法俱空了無一法可得湛然清淨不被諸境所轉皆由於自己也傅大士云欲證無生忍要假離貪嗔人法知無我逍遙出六塵川禪師云若不入水爭見長人頌曰一塵才起翳摩空碎抹三千數莫窮野老不能收拾得任教隨雨又隨風何以故若世界實有者至但凡夫之人貪著其事微塵謂因世界謂果若執因果為實有者即被相之所縛故云即是一合相但莫執為實有亦莫執為實無於相離相故云即非一合相是名一合相也又云微塵雖多不足為多世界幻成終無實義若說實有微塵實有世界即是彼此著相彼既是相我又著相兩相相合是謂一合相總是虗妄縛繫生滅但凡夫未悟妄生貪著耳即是不可說者須是學人自省自悟於理事上各無礙今凡夫一向貪著事相不達於理所以說因果著因果說世界著世界傅大士云界塵何一異報應亦同然非因亦非果誰後復誰先事中通一合理則兩俱捐欲達無生路應當識本源逍遙翁云學道之人但只了悟靈明之心是謂本源所以念念妄想皆為塵垢勿令染著久當證知清淨法身也川禪師云揑聚放開兵隨印轉頌曰渾圇成兩片劈破却團圓細嚼莫咬碎方知滋味全知見不生分第三十一直下頓除二執知見自然不生頌曰一擊心空忘所知朗然聲色外威儀灰飛煙滅心何在四見才興却是迷須菩提若人言佛說我見至即非法相是名法相佛說般若金剛之法始即令諸學人先除粗重四相如大乘正宗分中說也次即令見自性之後復除微細四相如究竟無我分中說也此二分中即皆顯出理中清淨四相明如來四相真見妄見者虗妄分別衆生見也真見者遠離執著如來見也在迷衆生執著諸相以為如來實有四見故不解所說義若悟如來真見能於自心無求無礙湛然常住是清淨我見黃蘗云百種多知不如無求最第一也又云諸學道人若欲得成佛一切佛法總不用學但學無求無著無求則心不生無著則心不滅不生不滅便是佛也若見自性本自具足是清淨人見於自心中本無煩惱可斷是清淨衆生見自性無變無異無生無滅是清淨壽者見故云即非我人衆生壽者見是名我人衆生壽者見也發阿耨多羅三藐三菩提心者應知一切衆生皆有佛性應見一切衆生無漏智慧本自具足應信一切衆生靈源真性無生無滅若能了悟此意即是一切智慧不作有能所心不存知解相口說無相法心悟無相理常行無相行故云不生法相是名法相也川禪師云飯來開口睡來合眼頌曰千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸應化非真分第三十二應現設化一切有為俱非真實頌曰世界僧祇轉法輪微塵剎土微塵身誰家底事婆心切爐鞴門開煆夢人須菩提若有人為滿無量阿僧祇至云何為人演說發菩薩心者謂發廣大濟度衆生之心最上乘種性人也持於此經四句偈等受持讀誦者七寶有竭四句無窮悟達本心了無所得持於此經其福勝前七寶布施功德緣此經根本以破相為宗了空為義迷性布施皆不證真故耳云何為人演說者四大色身不解說法聽法是你面前孤明歷歷通徹十方底解說解聽莫要記他語言縱饒說得天花亂墜其心不曾增便總不說其心不曾減求著轉遠學者轉疏惟在默契悟者自知也川禪師云要說有甚難只今便請諦聽諦聽頌曰行住坐臥是非人我勿喜勿嗔不離這箇只這箇劈面唾平生肝膽一時傾四句妙門都說破不取於相如如不動此謂語達無心無相可取之人若是有心不取於相却是取相心本是空相亦是空人法俱空有何可取也真淨文禪師云但無一切心自然合天道應用在臨時莫言妙不妙如如不動者蓋謂真性遍虗空世界無有形相湛然不動應現萬形雖赴感隨緣而真空實寂學人於此若謂我知也學得也契悟也解脫也似此見解皆是有動心則是有生滅若無此心即一切法皆攝不動不動即內外皆如故云如如不動也佛鑑和尚舉僧問法眼不取於相如如不動如何不取於相見於不動去法眼云日出東方夜落西其僧有省若也於此見得方知道旋嵐偃嶽本來常靜江河兢注元自不流如或不然不免更為饒舌天左旋地右轉古往今來經幾遍金烏飛玉兔走才方出海門又落青山後江河波渺渺淮濟浪悠悠直入滄溟晝夜流遂高聲云諸禪德還見如如不動麼川禪師云末後一句始到牢關直得三世諸佛四目相觀六代祖師退身有分可謂是江河徹凍水泄不通極目荊榛難為措足到這裏添一絲毫如眼中著刺減一絲毫如肉上剜瘡非謂坐斷要津蓋為識法者恐雖然恁麼佛法只如此便見陸地平沉豈有燈燈續焰川上座今日不免向猛虎口中奪食獰龍頷下爭珠豁開先聖妙門後學進身有路放開一線又且何妨語則全彰法體默則獨露真常動則隻寉片雲靜則安山列嶽舉一步如象王回顧退一步如獅子嚬呻法王法令當行便能於法自在祇如末後一句又作麼生道還委悉麼雲在嶺頭間不徹水流㵎下太忙生頌曰得優游處且優游雲自高飛水自流祇見黑風翻大浪未聞沉却釣魚舟何以故一切有為法至如露亦如電應作如是觀一切有為法上自天地造化下至人之所為皆是然稱此六如以設教化則止謂人事耳以衆生界內遷流造作皆是妄心起滅虗幻不實終有敗壞如夢幻泡影不得久長夢者妄想也幻者幻化也泡者水泡易生易滅也影者物影無所捉撮也露者朝露不得久停也電者閃電頃刻之光也傅大士云如星翳燈幻皆為喻無常漏識修因果誰言得久長易脆如泡露如雲影電光饒經八萬劫終是落空亡應作如是觀者有為無為皆由自己心常空寂湛然清淨無纖毫停留罣礙自然無心如如不動應作如是觀也四句偈者乃此經之眼目雖經八百手注解未聞有指示下落處人多不悟自己分上四句却區區向紙上尋覔縱饒尋得亦只是死句非活句也活句者直下便是然雖如此也須親見始得佛眼云千說萬說不如親見一面縱不說亦自分明要須返己自參切不可騎牛覔牛也若人將七寶無量布施不如受持自己四句為人解說使衆生皆得見性其福勝彼蓋以世間一切有為之法如夢幻等虗妄不實布施之法亦屬有為不得取著惟應受持四句覺明真性以證不生滅之極果耳僧問雲門大師云如何是佛門曰乾屎橛太平古禪師為作頌云我佛如來乾屎橛隨機平等遍塵寰迷頭認影區區者目對慈顏似等間蟾首座問洞山云佛真法身猶若虗空應物現形如水中月作麼生是應底道理洞云如驢井蟾云恁麼正是迷頭認影洞云首座又作麼生蟾云何不道似井驢也還會麼若教有意千般境才覺無心萬事休川禪師云行船盡在把梢人頌曰水中捉月鏡裏尋頭刻舟求劍騎牛覔牛空花陽𦦨夢幻浮漚一筆勾斷要休便休巴歌社酒村田樂不風流處也風流佛說是經已長老須菩提至皆大歡喜信受奉行夫至理無言真空無相謂都寂默也但不著言語不著知解即是無言無相金剛之旨趣本謂此也是以旋立旋破止要諸人乃至無有少法可得即不被一切諸境所惑若得心地休歇即謂之清淨心亦謂之本來心亦謂之到彼岸亦謂之涅槃亦謂之解脫其實一也四祖問三祖云如何是古佛心祖云汝今是甚麼四祖云我今無心三祖云汝既無心諸佛豈有耶即於言下有省此是學人標致張無盡云若能身處塵勞心常清淨便能轉識為智猶如握土成金一切煩惱皆是菩提一切世法皆是佛法即是了事凡夫別無聖解上根之人一聞千悟得大總持又何假如許開示耶川禪師云三十年後莫教忘却老僧不知誰是知恩者呵呵將謂無人饑得食渴得漿病得差熱得凉貧人遇寶嬰子見娘飄舟到岸孤客還鄉旱逢甘雨國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量剎塵沙界諸群品盡入金剛大道場
